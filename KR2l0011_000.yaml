body:
  text: 太常續考職官類一官制之屬提要臣等謹案太常續考八卷不著撰人名氏考書中所録蓋明祟禎時太常寺官屬所輯也凡祭祀典禮皆詳悉具載雖不免為案牘簿籍之文而沿革損益之由名物度數之細條分縷晰多明史禮志明會典明集禮及嘉靖祀典之所未載蓋總括一代之掌故則體貴簡要専録一官之職守則義取博賅言各有當故詳略逈不同也况集禮作於洪武會典作於成化嘉靖祀典惟載一時更張之事自世宗以後百餘年之典制記載闕如此書職官題名終於崇禎十六年則一代儀章始末尤為完具固數典者所不可廢矣乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:700c8a7f9c08e4d9c29e3f129e5d2bc10035463f6285ba2a1c5eacb84d15b28b
