北郊祝文維嗣天子臣御名謹遣敢昭告於皇地祇曰適辰元吉臣率羣僚耆庶祇上皇天上帝冊表禮成復取臨午加上太祖開天行道肇紀立極大聖至神仁文義武俊徳成功髙皇帝孝慈貞化哲順仁徽成天育聖至徳髙皇后冊寶於太廟敬此遣代聞於皇地祇伏祈鑒知謹告太社帝社壇祝文同但改臣為名聞於皇地祇五字改祭告二字次日百官行慶賀禮太常續考卷一
