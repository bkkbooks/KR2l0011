body:
  text: 太常續考卷一勅諭神樂觀開基守業必勤政為先趨事赴公非信誠必責𫝊不云乎國之大事在祀與戎曩古哲王謹斯二事而上帝皇衹恱賜天下安和生民康泰朕起寒㣲而君宇内法古之道依時以奉上下神祇其於祀神之道若或不潔則非為生民以祈福而保己命也昔劉康公成肅公㑹晉侯伐秦祭於社稷之神然後興師當祭之時畢則有受胙之禮其受之時必思洋洋乎其在上而穆穆然或左而或右委心愼敬而受之則祥故敬勝怠者吉怠勝敬者滅所以成肅公受胙之時起慢神不恭之貌因伐秦而卒是以知敬者必有動作禮義威儀之則以定命也於斯祀神之道能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業朕觀古人之敬神也若是其驗禍福亦若是斯可謂無神而不信乎可謂佞神而祈福乎二者皆不可惟敬之以禮而已朕設神樂觀備樂以享上下神祇所以撥錢糧若干以供樂舞生非傚前代帝王求長生之法而施之然長生之道世有之不過修心清浄脱離幻化速疾去來使無艱阻是其機也於戯昔殷周之父老何存漢唐之耆宿安在果長生之道乎朕設神樂觀以備樂碑之於觀以示後世其觀主不潔樂生不精贍生不足以此觀之不但君不勤於祀事其朝臣觀主必也亦然若君勤於祀事朝臣觀主無一體之敬則國有常憲故兹勒石想宜知悉洪武十二年十二月日勅諭神樂觀提㸃朕設神樂觀備五音奉上下神祇其勅居觀者皆慕仙之士其仙之教也或云始廣成子流𫝊至漢曰道士凡此者多孤處雲居棲巖屋樹是則宜其修也晨昏息心以去𤣥覽宵晝仰觀俯察以滌宿世之寃愆措今生之善行俄爾有知則倐然忽然躡雲衢而神遊八極徃無不達交無不接如此者安得不與神通故有飛神謁帝直與人辭者斯可謂修之至也今見修道士某雖未若此其志已處清虚特命職格神郎五音都提㸃正一仙官領神樂觀事爾中書吏部如勅施行諭徃欽哉勅諭神樂觀知觀朕聞軒轅時崆峒有修者其教獨善其身而已效之者往往津逮至漢天師張道陵致神倐忽飛符役劍轉斗移星其斡旋造化人莫知其然今之道士祖而效之雖未若是人皆清浄斯可職而奉神彼得樂於修煉者也神樂觀己命正官掌領觀事尚缺分理者部諸樂生以聴陳舉今見修道士某可授清浄五音知神樂觀事爾中書吏部如勅施行使徃欽哉洪武十二年十二月日皇帝御製太常寺箴為國之要事神理民太常典祀式交百神昔予祖考致嚴祀享厥有純誠敬恭協相朕承丕緒思用允迪爾祇爾肅以輔以翼儀度必飭粢盛必潔無黷無慢凛乎對越事神之本惟心之䖍豈直臨事平居有嚴神之鑒矣來歆來止神之歆矣民之福矣無曰𡨕𡨕洋洋有臨汝惟懋哉其慎其欽宣徳七年六月日皇帝勅諭太常寺官勅蔵本寺香帛庫朕惟祀神國之大事太常職典三禮協敬同誠以格神明非庶職之可比爾其念哉夫廟宇壇墠惟修惟潔汛掃以時惟爾之職犧牲粢盛惟豐惟備時惟馨香惟爾之職珪幣香祝薦獻之具樂舞之設咸用整飭惟爾之職爾一念不誠一事不恭一物不備皆為不敬其可不慎凡典守壇廟及諸執事爾恒戒警之俾約其縱心存其誠心以時共事進退周旋動合禮節惟爾克正乃克正人敬以存心㢘以守身勤以蒞事躬斯三者人孰不正凡爾僚屬同心一志庶諧厥任彼或不恭越禮廢事爾具以聞必斥去之㒺俾不良預我禋典爾克齊潔一心昭事天地鬼神以迓禎祥上佑我國家下福我臣民惟爾禄位亦保永久欽哉故諭宣徳十年六月日聖㫖說與太常寺及神樂觀提㸃壇官人等恁每職専奉祀天地一應事務須用竭誠盡敬親自打㸃都照洪武年間例行壇内壇外務要令人打掃十分潔浄不許縱放閒雜之人採打柴草出入作踐䙝瀆神明祭服祭器等件也要十分照管收拾齊整不許抛棄損壊協律賛禮等官及樂舞生都要時常㸃閘不許縱其在外非為附近壇所田不許縱人栽種及牧放牲口作穢其養牲官員務在提督旗軍以時牧放如法喂飼不許賣放私占及克減草料瘦損牛羊違者皆處以重罪不饒已令御史給事中錦衣衛官暗行巡綽捉拏恁每宜十分警省常存敬謹纎毫不要怠忽庶幾神明鑒恱以副朕恭事之意故諭聖㫖說與太常寺及山川壇官人等恁每職専奉祀山川神祇一應事務須用竭誠盡敬親自打㸃都照洪武年間例行其殿宇廊廡及神厨神庫等房并内外空地務要令人着實打掃十分清潔不許縱放閒雜之人進去作踐䙝瀆神明祭服祭器等項也要十分照管收拾齊整不許抛棄損壊壇外除栽種黍稷稻梁供祀外其餘附近田地不許縱人栽種及牧放牲口作穢違者處以重罪不饒己令御史給事中錦衣衛官暗行巡緝捉拏恁每宜十分警省常存敬謹纎毫不許怠忽庶幾神明鑒恱以副朕恭事之意故諭聖㫖説與神宫監及太常官員人等恁每職専奉祀太廟一應事務須用竭誠盡敬親自打㸃都照洪武年間例行其殿宇廊廡及神厨神庫等房并内外空地務要令人着實打掃十分清潔不許縱放閒雜之人進去作踐䙝瀆神明祭服祭器供器等項也要十分照管收拾齊整不許抛棄損壊附近之處不許縱人栽種及作穢違者處以重罪不饒已令人暗行巡綽捉拏恁每宜十分警省常存敬畏纎毫不要怠忽庶幾神明鑒恱以副朕恭事之意故諭聖㫖說與神宫監及太常官員人等恁每職専奉祀社稷凡一應事務須用竭誠盡敬親自打㸃都照洪武年間例行其壇塲及神厨神庫等項并内外空地務要令人着實打掃十分清潔不許縱放閒雜之人進去作踐䙝瀆神明祭服祭器供器等項也要十分照管收拾齊整不許抛棄損壊附近之處不許縱人栽種及作踐違者處以重罪不饒已令人暗行巡綽捉拏恁每宜十分警省常存敬畏纎毫不要怠忽庶幾神明鑒恱以副朕恭事之意故諭宣徳十年六月日大祀源流事宜祀有三曰大祀曰中祀曰小祀大祀曰天地宗廟社稷陵寢中祀曰朝日夕月太嵗帝王先師先農旗纛小祀曰后妃嬪太子王妃公主及夫人曰三皇曰先醫曰五祀曰司火曰都城隍曰東嶽曰京倉曰啓聖公曰漢夀亭侯曰文丞相曰姚少師曰北極佑聖真君曰金闕玉闕眞君曰司牲𫝊曰國之大事在祀與戎昔者竊疑之祀也而等之戎乎然孔子曰俎豆之事則嘗聞之軍旅之事未之學也蓋祀之重重於戎矣獨奈何其等之也夫禮非天子不議非聖人不作非百年不興其難言如此髙皇帝開天御世首嚴郊廟之禮迨肅皇帝益光大而損益之或先分後合或先合後分或特享或合享中間反覆區畫既度諸古又度諸今既度諸情又度諸禮即纎悉曲折必求其當乃已我太祖皇祖之心眞若上帝之臨其上祖考之當其前而以一格享為快者蓋不待燔瘞灌獻之文而聖心之仁孝固已格於皇天而恵於祖考矣故曰明乎郊社之禮禘嘗之義治國其如視諸斯乎明其義者明其心之謂也而議者曰分乎合乎特廟乎同堂乎竊竊焉數之固哉或曰同堂異室古乎曰非古也自漢以來未之有改也其未之改何也曰禮時為大夏言氏之議備矣曰郊祀之分也如祖制何曰我太祖初嘗分祀矣夫皇祖亦猶率舊之章也曰父母合食太祖不有訓乎曰夫父母惟其子之肖耳子而肖矣即合而饋之分而饋之奚不可哉故曰因心之謂禮以義起之謂禮乃竊竊焉當其合則言分當其分則言合將紛紛之議何時定耶固哉議者議者固哉或曰若是則今之禮遂無可議乎郊祀吳元年建圜丘於鍾山之陽以冬至祀昊天上帝建方丘於鍾山之隂以夏至祀皇地祇洪武元年二月上勅禮官太常曰昔聖帝明王嚴於祭祀内致誠敬外致儀文朕膺天命首崇祀事顧草創之初典禮未備何以交神明致靈貺其博考郊禮以聞丞相李善長學士陶安太常卿胡惟庸等議祀天圜丘以大明夜明星辰雲雷從原太嵗今更雲雷祀地方丘以嶽鎮海瀆從上從之撰二丘樂章安等又議古者天子五冕祭天地宗廟社稷諸神各有所用請製之上以五冕禮太繁惟天地宗廟社稷服衮冕餘祀服通天冠絳紗袍二年奉仁祖配天地位西向時中都亦有南北丘焉五年令皇帝郊祭太子留宫居守親王戎服從七年上以大祀正獻畢始分獻未安諭學士詹同宋濓議請初獻奠玉帛分獻官即初獻亞終獻如之上曰善八年詔翰林議郊祀豋壇脱舃禮尋以學士樂韶鳳奏罷之是年始奏上所撰樂章九年令郊祀大事國有三年喪不廢十年春上感齋居隂雨覽京房灾異之説始定合祀禮上更撰樂章八月即圜丘為大祀殿壇而屋之罷方丘十一月丁亥合祀於奉天殿其祝文曰曩者建國之初遵依古制祀以南北之郊御名周旋九年以來見古人之意固誠於禮未為然也且人君者父天母地其仰瞻覆載無不恩也及其祀也則有南北之壇終不㑹祀以人事度之為子之道致父母異處安為孝乎今也大壇鼎建未完朝堂新造已備時當冬至謹合祀於殿廷自今已後每嵗合祀於春時永為定禮以皇考仁祖淳皇帝配神惟上帝皇祇鑒之十二年正月壇成始合祀於大祀殿昊天上帝后土皇地祇並南向仁祖配位如故從祀丹墀四壇曰大明曰夜明曰星辰又曰星辰内壝外二十壇曰五嶽壇五中嶽壇以鍾山附曰五鎮壇五曰四海壇四曰四瀆曰風雲雷雨曰山川曰太嵗曰天下神祇曰歴代帝王各壇一凡二十四壇大臣分獻禮成上大喜作大祀文並歌九章其辭曰朕聞太極之化也天生於子地闢於丑位極既定虚其中而為寰宇是時人生於寅樂居兩間人生既多非聖莫馭天生君主為民立命然鴻荒之時莫知誰始今載於書始自伏羲相繼而至唐虞以及夏商周斯數君者開天立極首興彛倫者乃前伏羲神農黄帝是也法三皇而守行者少昊顓頊髙辛唐虞其益損禮樂文餙其事者獨夏商周也下至秦漢以及宋元亦然嗚呼天惟自然而常者三綱五常也昔聖人度人情而措彛倫特不逆其性務從其善未嘗有異此道而為人君者也每聞昔君欽若昊天莫敢有怠朕即位以來命儒臣徧求羣書自周以至宋元皆著祀典守而行之然當行祀之時惟宗廟頗合人情南北二郊以及社稷甚有不合人情者以社稷言之古人以社為五土之神稷為五榖之神土主發生五榖用之以生而乃一圍之中各壇而祭是土榖不合於生生之意也行禮之時先社固宜也又先奠社配乃行稷神之禮此果合人情乎况朕自即位以來祀天享地奉宗廟社稷每當齋期必有風雨臨祭方斂毎以為憂京房有云郊祀鬼神必天地雍和神乃答矣若有飄風驟雨是為未善於是自洪武十年更祀社稷於闕右去繁就簡一壇合祀以奉二神神乃我答人情懽恱後洪武十一年命三公率工部役梓人於京城之南創大祀殿合祀皇天后土是年冬十二月三公奏告工成朕命禮部云前代之祭期嵗止一祀朕度古人之祀南北郊彼以義起故曰南郊祭天以其陽生之月北郊祭地以其隂生之月孰不知至陽祭之於至隂之月至隂祭之於至陽之月於禮可疑且掃地而祭其來甚逺言祀天地尚質不尚華固執古不變至今天地之享與人不異朕以斯禮執古不變則人之享亦執古而不變乎若人執古則汙尊抔飲茹毛飲血巢居穴處今可行乎斯必不然因命太常卿每嵗祭天地於首春三陽交泰之時遂於洪武十二年正月十有一日合祀天地前期致齋五日内二日以告仁祖三日正齋風和日暖及夜陞壇山川草木不揺江海息波輕雲縹緲於昊穹獨見太隂於中天纎塵不動銀燭舒光香烟裊繞斯必神之降臨合祀宜也朕雖失學無文特述其事而歌咏之歌章不具載是年上命禮官陶凱曰經言鬼神無常享享於克誠人謹方寸於此而能格鬼神於彼由至誠也然人心操舍無常必有所警而後無所放其鑄銅人高一尺五寸執簡書曰齋戒三日凡致齋之期致朕前庶朕心有所警省而不敢放此進銅人之始二十一年増修壇壝殿丹墀中叠石為臺東西相向為壇四内壝外為壇二十亦東西相向以文武大臣及近侍官二十四人分獻罷朝日夕月禜星之祭并罷太嵗風雲雷雨嶽鎮海瀆山川月將城隍歴代帝王之春祭三十二年即建文元年撤仁祖位更奉太祖髙皇帝配文皇帝即位亦如之永樂八年上巡北京命皇太子攝遣禮部尚書復命十八年京師大祀殿成規制如南京行禮如前儀增附天夀山於北嶽壇然上嵗仍親祀於南京有事則遣官祭告洪熙元年增文皇帝配位太祖下西向嘉靖九年上鋭意太平考正禮樂給事中夏言以分祀請下廷臣議主分祀者右都御史汪鋐中允廖道南編修程文徳等八十二人主分祀而以成憲及時詘為言者大學士張璁等八十四人主分祀而以山川壇為方丘者尚書許瓉等二十六人主合祀而不以分祀為非者尚書方獻夫侯郭勛編修徐階等二百六人漫不可否者英國公張崙等一百九十八人上曰分祀禮也遂作圜丘於舊天地壇南其制度曲折皆上所裁也諸臣莫能賛焉是年始以嵗孟春上辛日祀上帝於大祀殿舉祈榖禮夏言言虞夏殷周四代之郊惟配一祖至唐宋乃有三祖同配之謬祖宗並配父子同列於經制非宜請倣周后稷配天文王明堂配帝之意南北二郊奉太祖配祈榖奉文皇帝配下廷議羣臣以為不可疏留中不報言再請上怒羣臣違君叛禮令祈榖二祖并配二郊專奉太祖配十年改以啓蟄日行祈榖禮於圜丘仍止奉太祖配十七年薦大號於天改昊天上帝稱皇天上帝是年上欲仿周明堂之制宗祀皇考以配上帝詔舉大享禮於𤣥極寶殿奉睿宗獻皇帝配十八年春又改行祈榖禮於𤣥極寶殿不奉配𤣥極寶殿者大内欽安殿也殿建於宫右自行大享祈榖禮改今名云二十四年撤舊大祀殿改建泰享殿命禮部嵗以季秋奏請卜吉行大享禮併擬行祈榖禮於殿中比殿成而大享祈榖仍於𤣥極寶殿遣官行禮以為常隆慶元年莊皇帝即位遵遺詔詔禮官議郊廟禮禮官髙儀言明堂大享雖古禮然制度不可考皇考視睿宗為嚴父皇上視睿宗則為皇祖若以今日仍奉睿宗配帝似與周祀文王之義不恊元日祈榖禮經有之然行禮之詳不可考見我國家先農之祭即祈榖遺意既祭先農復云祈榖二祀並行不無煩數且𤣥極寶殿乃禁嚴内地而大享祈榖陪祀從臣宵分出入如體統何臣等謹奉明詔㑹同文武大臣九卿科道等官都尉謝詔等議大享祈榖並罷之宜上曰可於是大享祈榖不復行𤣥極寶殿仍改為欽安殿而二郊分祀如故每嵗冬至上大祀天於圜丘夏至大祭地於方澤國有大事則祭告焉冬至圜丘事宜圜丘壇壇建於正陽門外南左三里許為制三成壇面并週欄俱青磂􅲚東西南北階九級俱白石内櫺星門四座南門外東南砌緑燎爐燔柴焚祝帛傍砌毛血池西南築望燈臺祭時懸燈於竿末崇禎九年冬至奉上𫝊添設共三燈外櫺星門亦四座南門外左設具服臺東門外建神庫神厨祭器庫宰牲亭北門外正北建皇穹宇翼以兩廡外又建四天門東曰泰元門南曰昭亨門門左右牌坊二座西曰廣利門西建鑾駕庫又西為犧牲所北曰成貞門門外西北建齋官迤西為壇門一成上皇天上帝南向太祖配神西向二成上從祀四壇東西相向東大明西夜明次東木火土金水星二十八宿周天星辰次西雲師雨師風伯雷師每嵗冬至上大祀天於圜丘凡國有大事則祭告天壇祠祭署署建於廣利門外之右房十間中為公座傍為官舍嘉靖九年從言官夏言議建圜丘遂建今署署官奉祀一員祀丞一員壇戸二十五名國初置天地壇祠祭署奉祀祀丞各一員後改稱南郊祠祭署永樂中京師建天地壇建署於内西天門外之左房十間中為公座傍為官舍改稱郊壇祠祭署已復稱天地壇祠祭署嘉靖九年分祀天地别建今署於圜丘壇即廣利門外後以行祈榖禮於大祀殿今改為泰享殿改天地壇祠祭署稱祈榖殿祠祭署奉祀祀丞仍各一員壇戸二十五名隆慶元年祈榖禮罷三年裁祈榖殿奉祀祀丞不設壇户亦𨽻天壇祠祭署然祭雖罷而壇署猶存故天壇奉祀住於祈榖壇祠祭署兩壇之任總二官並攝舊有守門軍四名萬厯四年本寺卿劉某以圜丘修理工完題請巡壇軍役兵部覆奏欽依除守門四名仍舊外撥軍四十名巡邏冬至前期一月擇吉日合寺官詣犧牲所祭司犧牲等神陳設儀注祭日合寺官具吉服詣所導引導至正牛房賛引賛詣盥洗所盥訖賛上香正堂上正牛房香左右少堂上太廟社稷牛房香畢皷樂迎至神祠賛引賛就位賛詣前正堂詣香案前賛上香三上香訖賛復位賛四拜賛初獻禮執事捧爵跪獻於各神位前賛跪賛讀祝讀訖賛俯伏興平身賛亞獻禮終獻禮儀同初獻惟不讀祝賛四拜賛化財賛詣化財所酹酒訖賛禮畢皷樂導至犧牲所南門外觀牲畢仍導至㕔發看牲牌一面上書恊律等官姓名每日輪二員詣所視滌如法喂養一祝文維年嵗次月朔日太常寺卿某等致祭於司犧牲之神青山水草之神犧牲所土地之神曰郊祀所重犧牲為先畜牧豐肥惟神是賴某等選兹吉辰躬親上滌欽奉上命祭用餚饈謹用祭告神其鑒之尚享一本寺出香燭果品等物祝文一道降香四炷并散降香五斤八兩燭二枝四兩燭四枝二兩燭二十枝胡桃四斤紅棗五斤栗子六斤荔枝三斤圓眼三斤香油十三斤八兩砂糖四斤白鹽五兩土堿一斤十兩豆粉一斤紅豆一斗麫一百零三斤木耳細茶各二兩頂花一朶木柴四百斤木炭五斤又木柴五千斤寳坻縣解木炭二百五十斤霸州觧折銀二兩五錢祝文本紙二張包香黄