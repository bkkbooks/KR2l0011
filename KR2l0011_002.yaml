body:
  text: 太常續考卷二太廟五享事宜國初建四親廟於闕左廟主皆南向東西有夾室有廡三門門設二十四㦸繚以周垣略如都宫之制歳時皆特享洪武元年定四孟歳除五享有司請製祭器上曰今之不可為古猶古之不可為今其製如事生之宜於是器用金楎椸枕簟篋笥帷幔浴室皆備二年令春以清明夏以端午秋以中元冬以冬至時享其歳除如故祝稱孝子皇帝不得稱臣遣太子稱命長子某不得稱皇太子三年令時享仍用四孟孟春特享於各廟各行禮奏樂三時合享於徳祖廟初獻各奏其廟樂餘奏徳廟樂六年令宗廟等祭祀祝文來說時必須著一員官捧著立地另著一員官前面跪著說看時却放在案桌上他自往前來跪聽不要將著祝文跪著說八年定廟享登壇脫舄禮九年改建太廟前正殿翼以兩廡後寢殿九間間一室主皆南向几席諸器備如生儀歳孟春擇上旬吉日三孟朔日歳除日皆合享於正殿設徳祖帝后衣冠於神座居中南向懿熈仁三祖以次列東西向設神座陳衣冠不出主凡合祭奏徳廟之樂罷特享禮樂二十五年令廟享值國喪樂備而不作三十一年建文元年祔太祖永樂中建廟京師如南京制洪熈元年祔成祖宣徳元年祔仁宗宣徳十年祔宣宗天順八年祔英宗寢殿以次皆南向正殿神座以次皆東西向而九廟備矣𢎞治元年憲宗將升祔議祧禮禮部尚書周洪謨言國家自徳祖以上莫推其世次徳祖視周后稷不可祧太祖太宗視周文武百世不遷其祧懿祖請於寢殿後别建祧廟如古夾室之制歳暮奉祧主合享如古祫祭禮吏部侍郎楊守陳言禮官議非是禮天子七廟祖功而宗徳凡號太祖即始祖也徳祖可比商報乙周亞圉非契稷比議者習見宋儒嘗取王安石説遂使七廟既有始祖又有太祖太祖既配天又不得正位南向名與實乖非禮請並祧徳懿熈三祖自仁祖而下為七廟如古禮異時祧盡則太祖擬契稷而祧主藏於後寢祫禮行於前廟時享尊太祖祫祭尊徳祖如此功徳崇恩義備上竟從禮官議建祧廟藏懿祖王并神座儀物熈祖而下寢殿神主正殿神座皆以次遞遷𢎞治十八年祔孝宗祧熈祖正徳十六年祔武宗祧仁祖嘉靖九年上將祔睿宗諭禮官曰太祖肇運開基壓於太廟非宜遂祧徳祖太祖居中南向是年春行特享禮令祠官於廟殿設帷幄如各廟列聖皆南向各奠獻讀祝三孟如舊十年冬上諭禮官曰太祖以恩隆徳祖今日當以義尊太祖祫祭奉四祖同太祖皆南向庶見太廟為特尊太祖之意禮官夏言言禮合羣廟之主而祭於太祖之廟是為大祫亦以尊太祖也太廟太祖之廟不當與昭穆同序太祖太廟之祖不可與子孫並列自今大祫宜奉徳祖居中懿熈仁太祖東西敘皆南向列聖左右敘東西向如故不惟我太祖列羣廟之上足以伸皇上之心而懿熈仁三祖得全其尊尤足以體太祖之心上曰善十一年罷設衣冠仍請主先是上坐文華殿召輔臣李時翟鑾禮官夏言議復古七廟制未决㑹中允廖道南疏請建九廟上喜下廷議禮官言言古者天子廟制唐虞五夏因之殷周皆七而祭法王制與劉歆宗説又各不同宋儒朱熹古今廟制引王制天子七廟外為都宫内序昭穆漢不考古諸帝異廟諸廟異地不合都宫不序昭穆明帝遵儉自抑遺命勿别為廟遂有同堂異室之制嗣後歴魏晉隋唐宋皆然我太祖初立四親廟廟皆南向似近古禮後建為太廟又用明帝之制皇上憲天稽古大釐祀典獨於廟制不能無疑形諸翰札宣諸召問謀諸臣弼者屢矣今太廟南近宫牆東邇世廟西阻前朝地勢有限上諭太廟三殿勿撤則太廟垣外左右隙地不盈數十丈若依古制昭穆六廟在太廟前以次而南則今太廟都宫之南至承天門牆不逺即使盡闢其地為左昭右穆猶恐勢不能容若欲稍减規模不必别門異寢又恐禮未必協况古七廟九廟制度皆因今太廟巍然𢎞壯而羣廟隤然湫隘亦恐於義未安議者欲就太廟兩廡即分羣廟不惟去尊即卑不足以稱聖孝而遷就一時裁損廟貌尤非細故且有廟無寢神將安棲諸王功臣置之何所議者又欲藏主夾室夫夾室者側室也以藏祧主可也以藏親廟未毀之主情理舛矣至謂周人廟制約儉宜倣為之夫周廟門大扃七個闈門小扃三個則大門實容二丈一尺小門實容六尺其制過於今廟烏在其為儉約也今損於太廟羣廟可又損於世廟乎且太宗功業比隆太祖憲宗獻皇父也又可减於世廟乎今之廟主太宗之下凡有七聖將如古制為三昭三穆而止六廟乎抑如商周以太宗為百世不遷之宗而加立七廟乎即使廟宇既成皇上冠冕佩玉執圭服衮循紆曲之途徧歴羣廟而行興俯拜起奠獻之禮非獨筋力不逮而日亦不給矣議者乃曰周禮宗伯代后獻羣廟可遣攝也夫古者廟祭君后祭獻后不與祭宗伯代獻謂一廟之中代亞獻之禮未聞人臣可以主廟祭也且古者助祭諸侯類多同姓罔非天𦙍今陪禮者可擬古諸侯乎皇上仁孝誠敬可以終歳舉祭止對越太祖之廟而不一至羣廟乎且規制必備而後成廟門垣廡寢是也儀文必備而後成禮主助禮樂之類是也今分為各廟廟祭之時不得不降從簡易是欲尊之而反卑親之而反疎祇見其貶損而未見其隆重矣大學士丘濬謂宜一日間祭一廟歴十四日而徧七廟此盖無據而强為之說不自知其言之迂也馬端臨曰後世失禮豈獨廟制漢儒以來講究非不詳明而卒不能復古者以昭穆難定故也必如古制父子相世則可兄弟相及則其序紊矣周孝王以共王之弟懿王之叔繼懿王而立故朱子廟圖宣王之世則以穆懿夷為昭共孝厲為穆夫穆王昭也共王穆子穆也懿為穆孫則繼穆而為昭是也孝為共弟而繼共為穆雖於世次不紊然以弟而據孫之廟矣夷王懿王子也穆也而圖居昭厲王夷王子也昭也而圖居穆是孝王立而夷厲之昭穆易位於是朱子亦無以處此不過即其繼立之先後以為昭穆而不能自守其初説矣又况宣王時三昭三穆為六代所祀合始於昭王今孝王居其間於是昭王以六世祖雖未當祧而已在三昭三穆之外名為六廟而祀止三世耳前乎周者為商商武丁之時所謂六廟祖丁南庚陽甲盤庚小辛小乙也然南庚者祖丁兄子陽甲盤庚小辛小乙又皆祖丁之子姑以祖丁為昭言之則南庚至小乙皆祖丁子行為穆是一昭五穆而武丁所祀上不及曾祖未當祧而祧者四世矣後乎周者為唐唐懿宗之時所謂六廟者憲穆敬文武宣然穆宣皆憲之子文武又皆穆之子姑以憲宗為昭言之則穆宣為穆敬文武為昭是四昭二穆而懿宗所祀上不及髙祖未當祧而祧者三世矣若必欲祀及六世則武丁時太祖之外必十廟懿宗時太祖之外必九廟而後可盖繼世者既不能必其為弟為子建廟者亦安能預定其為昭為穆或穆多昭少如殷或昭多穆少如唐哉若必欲昭穆世敘則建廟之時昭齒者必在太祖之廟之左穆齒者必在太祖之廟之右如此預立六廟定三昭三穆以次遞遷之説又不可行矣更都以來同堂異室未可盡以為非也皇上以皇考專享世廟而太祖列聖乃不得專廟以全其尊列聖同享太廟己極尊崇而皇考專居世廟猶為避遜若廟制大小不倫行禮親攝或異則尊卑厚薄之間不足以稱皇上孝敬之誠皇上劄諭輔臣祀典宜正廟制難更大哉皇言實萬世之訓也疏入上不允竟從道南議撤故廟祖宗各建專廟合為都宫太廟因舊而新之居中文皇帝世室在太廟東北居六廟上昭穆六廟列太廟左右廟各有殿殿後有寢藏主太廟寢後别有祧寢藏祧主太廟門殿皆南向羣廟門東西向内門寢殿皆南向十三年南京太廟灾上竟欲勿建勑廷臣議禮官言京師宗廟行且復古而南京太廟灾聖祖之靈不可不黙㑹上悦令亟起新廟罷建南京太廟廟址築周垣香火并入南京奉先殿先是上既追尊獻皇帝建世廟於太廟東南以四孟享十五年改世廟為獻皇帝廟十二月九廟成詔曰朕創昭穆羣廟以祀祖宗彰太廟為專尊之王復作太宗廟於羣廟之外表功徳不遷享百世更創皇考廟曰獻皇帝廟别建吉區以避渠道止修時祭以避豐昵之嫌十七年九月上尊皇考廟號睿宗祔享太廟睿宗於孝宗弟行也躋武宗上遂尊太宗為成祖其冊文曰臣聞古先聖王有大功徳必有大名稱是以見諸當時則盛大而莫及施諸後世則震耀而無窮然節恵之諡雖表於至公而述徳之辭未足以盡實則為子孫臣庶永言孝思而弗可諼者豈容不崇薦鴻號以丕揚大烈乎恭惟皇祖文皇帝躬上聖之資抱神睿之畧文章煥然而可述功烈巍乎以有成當眷顧維新之命遭艱難未造之家將周公東征之師而大定王室則所以成繼述之孝者何其勤遷武王鎬京之都而永建帝業則所以成創守之功者何其大表章六經垂範萬世禮樂明備教化大行有經天緯地之文親御六飛威振絶漠四裔君長咸奉職貢有保大定功之武光踐寳阼而二紀之治坐致太平晩付皇儲而萬幾之勤不廢總攬至於敬天勤民右文重道親賢逺佞兼有君師之衆善乃若懋賞輕刑畏灾重榖憫農優艾備有帝王之全徳此則自載籍之𫝊未有豐功駿業可以加兹者也臣忝以支童託承大徳比已恭建特廟用圖百世不遷兹者加上尊稱期於配天罔極謹奉冊寳上尊諡曰啟天𢎞道髙明肇運聖武神功純仁至孝文皇帝廟號成祖伏惟靈徳在天顧歆廟祐鑒兹㣲悃臨享徽稱保我子孫億萬斯世是日上獻皇帝后尊號其冊文曰臣聞古訓徳莫顯於基命孝莫大乎尊親是故有聖人之徳必膺天命之歸惟天子之孝尤以尊親為至洪惟我明開國百年業承八聖乃小子獲奉郊廟進陟祖位匪我皇考大徳受命以敷錫𦕈躬曷克臻兹顧欲申罔極之恩實乆鬱追崇之典兹欲光於前聞垂之來載不有隆稱顯號其何以表至聖而昭眷命乎恭惟皇考獻皇帝睿明天縱恭儉性成蕩蕩難名道配乎帝堯之大乾乾不息徳比於文王之純學本聖𫝊心契乎四書六經之㫖國封南服化行於江沱汝漢之濵方憲祖賔遐之後當孝皇在阼之年迎養一辭昭昭乎神明享其孝遣治一疏恢恢乎帝王同其情奉藩二十五年心罔不在王室而昭事上帝之心翼翼如有臨閱世四十四載身罔敢自暇逸而學道愛人之志孜孜不少倦乃若游情翰墨則精究古法非經訓之辭弗書至於怡神宫庭即應接斯須非聖賢之事弗語喜怒不遷賞罰必當有𤼵而中節之和明照無私幽隠必達有無所不通之睿摛辭電發煥然其有文章冥心天游廓乎其有容徳誠可謂包衆善而難名兼百行而備有者也臣祇繼遺庥茂承餘烈永惟至恩大徳無物可稱是以恪稽典禮率籲羣心謹奉册寶更上尊號曰知天守道洪徳淵仁寛穆純聖恭儉敬文獻皇帝廟號睿宗伏惟聖靈如在皇鑒孔昭膺顯大於無疆與乾坤而同乆永昌祚𦙍攸寧萬邦獻皇后冊文曰臣聞頌稱夀母子賴以成者逺風美賢妃化行於助者深是故母儀所被萬方仰其徽音内治明章閨門由之正始永惟懿徳卓耀前聞自非隆大號於追崇曷以酬至徳於罔極粤詢古式率乃彞章恭惟皇妣大行章聖慈仁康靜貞夀皇太后貞明合天廣大法地宅心專靜坤道得一以寧約己儉勤母徳用慈為實於憲祖有逮事之孝敬於睿考有輔佐之憂勤爰及𦕈躬之踐阼式臨慈極以居尊藴性仁恭豈鄧馬之足尚秉心敬愛嗣任姒之芳徽化洽六宫恩覃四域三十載化行於江漢之國十七年受養於長樂之宫九廟聖靈儼褘衣而祗謁七陵閟寢勤鸞馭以瞻依方欣介百福以有永固宜享千齡於無疆豈意天不慗遺雖切攀號何逮追惟顧復徒創鉅而感深上荷劬勞實叩心而銜恤兹欲播休聲於後嗣揚芳烈於無窮匪易大名曷尊至徳敬遵典禮請命於天謹奉冊寶上尊諡曰慈孝貞順仁敬誠一安天誕聖獻皇后惟親慈降鑒臨享徽稱陟附嚴宫萃歆萬禩佑於嗣人永永無極是年十一月上復加髙皇帝后尊號其冊文曰臣伏聞自古受命之君躬接于天萬世不隳號稱太祖然歴選前辟功徳髙大未有如我皇祖之盛者也是故舜禹受禪乃揖遜而有其位湯武𫝊業猶放伐而取諸人欽惟我太祖髙皇帝當有元剥亂之秋奮大人虎豹之變乃奮揚神武取中國於疆隅分裂之餘恢闡聖文明王道於綱常淪斁之後掃彌天之㓂於宇内經百戰而帝業成剪羣雄之亂於四方不十載而天下定得國之正視商周而功烈有光受命維新比虞夏而艱難事倍殆與闢乾坤於混沌肇人紀於狉榛同一揆也若夫制禮作樂經文緯武仁恩溥於萬類教化行於四海躬帝王之大徳建聖神之極功則又兼總百王髙視千古獨立一代卓乎無前者也不有顯號何以昭公議於千萬世𤣥孫某早以冲人纘承大位永念祖徳莫可名言兹者不量顓䝉敢效摹擬謹恭奉册寳加上尊號曰太祖開天行道肇紀立極大聖至神仁文義武俊徳成功髙皇帝伏惟聖靈在天鑒觀有赫垂庥委祉啟佑後人祚我皇明與天無極髙皇后冊曰臣聞后妃徳侔於天地式奉神靈之統閨門化洽于家邦允惟王教之端三代之興罔不繇是自關雎化㣲徽音益逺漢唐而降懿徳罕聞乃若輔聖成天贊元斡化篤生成祖再造丕基則自上世以來未有若我髙皇后之徳之功者也國家百年隂教明章内治成順遡源徂委厥有自來敬惟我孝慈髙皇后生有至徳作配聖王懿範貞容母儀天下嘉言善行風動萬邦左右廟謨有叅贊運籌之力服勤女事歴艱難創業之勞不妄殺人之言與孟軻之訓相發無忘布衣之念與無逸之書同㫖大哉仁聖之徳曠古鮮儷載籍所𫝊莫斯為盛己臣永慕慈恩名言莫罄謹恭奉冊寳加上尊諡曰孝慈貞化哲順仁徽成天育聖至徳髙皇后伏惟聖靈昭鑒享懿號於無窮保我子孫賛祖基於永世上於是定享祫禮及其樂章凡立春特享上親獻太廟遣大臣獻列聖廟各出主成廟迎神樂别歌三獻徹饌還宫樂如太廟仁宣英憲四廟樂歌同孝武二廟迎神樂别歌三獻徹饌還宫樂歌同睿廟樂異於諸廟立夏時祫各出主於太廟大殿行禮立秋時祫如夏禮樂歌異於夏立冬時祫如秋禮迎神徹饌還宫樂歌異於秋季冬擇中旬吉日大祫出四祖太祖成祖七宗主於太廟歌大祫樂歌祭畢各歸主於其寢是年皇后助獻罷脫舄禮二十年四月八廟灾初震火起仁廟風大𤼵主燬俄而成祖廟火又燬延爇太廟及羣廟惟睿廟存上奉列聖主於景神殿遣大臣入長陵獻陵告題成祖仁宗帝后主同奉于景神殿已遷于奉先殿上重建太廟復同堂異室之制二十四年七月新廟成廟建於闕左正殿九間内設列聖冠服東西側間設親王功臣牌位前為兩廡東西二燎爐東燎列聖親王祝帛西燎功臣帛南為㦸門設具服小次門左為神庫右為神廚又南為廟門門外東南為宰牲亭南為神宫監西為廟街門正殿後為寢殿奉安列聖主皆南向又後為祧廟藏祧主皆南向時享於四孟祫於歳除仍設衣冠合享不出主如太祖制二十八年孝烈皇后升祔祧仁宗四十五年世廟升祔更奉孝潔肅皇后同祔廟遷孝烈於𢎞孝殿先是孝潔薨未有本室禮官議暫祔奉慈殿側以俟及孝烈升祔遂不復孝潔至是禮官髙儀等奉上詔議曰孝潔皇后肅皇帝元配也禮太廟祔享惟一帝一后后惟元配今孝烈先祔廟若奉孝潔同祔則二后並配非制若以孝烈先祔而孝潔遂不祔舍元配而祔繼配亦非制况孝潔宜祔之禮皇考先年有欽依近有遺命臣儀等昧死請孝潔祔享移孝烈𢎞孝殿仍於大行皇帝𤼵引之先遷孝潔梓宫與聖母梓宫同日祔葬永陵仍各加上尊諡上從之隆慶六年穆宗帝后升祔祧宣宗萬厯四十八年神宗帝后升祔祧英宗泰昌元年光宗帝后升祔祧憲宗天啟七年熹宗皇帝升祔祧孝宗四孟時享歳暮大祫如舊先是廟祭髙曾祖上祝稱五廟皇祖考妣迄今上仍稱五廟而憲宗以下始詳帝后諡太常寺卿温純議憲孝睿武世穆五宗六廟而上惟二祖英宗設祭而猶云五廟舛也且詳於憲廟以下而二祖英宗統云五廟祖考妣簡也於禮未宜閣臣轉以聞上改之列敘九廟帝后如今式云寢殿神主每歳四孟正殿時享同太祖開天行道肇紀立極大聖至神仁文義武俊徳成功髙皇帝孝慈貞化哲順仁徽成天育聖至徳髙皇后中室成祖啟天𢎞道髙明肇運聖武神功純仁至孝文皇帝仁孝慈懿誠明莊獻配天齊聖文皇后東第一室睿宗知天守道洪徳淵仁寛穆純聖恭儉敬文獻皇帝慈孝貞順仁敬誠一安天誕聖獻皇后西第一室武宗承天達道英肅睿哲昭徳顯功宏文思孝毅皇帝孝靜莊惠安肅温誠順天偕聖毅皇后東第二室世宗欽天履道英毅聖神宣文廣武洪仁大孝肅皇帝孝潔恭懿慈睿安莊相天翊聖肅皇后西第二室穆宗契天隆道淵懿寛仁顯文光武純徳𢎞孝莊皇帝孝慈貞惠順哲恭仁儷天襄聖莊皇后東第三室神宗範天合道哲肅敦簡光文章武安仁止孝顯皇帝孝端貞恪莊惠仁明嫓天毓聖顯皇后西第三室光宗崇天契道英睿恭純憲文景武淵仁懿孝貞皇帝孝元昭懿哲惠莊仁合天弼聖貞皇后東第四室熹宗達天闡道敦孝篤友章文襄武靖穆莊勤悊皇帝西第四室寢殿主皆南向太廟正殿貯諸帝后冕旒鳳冠袍帶匱而藏之祭則陳設祭畢仍藏匱中凡國有大事則告祭廟中東廡下設夀春王劉妃為一壇霍丘王翟妃下蔡王安豐王趙妃南昌王為一壇䝉城王田妃旴𣅿王唐妃臨淮王劉妃為一壇寶應王六安王來安王都梁王英山王山陽王昭信王為一壇按吾學編夀春王於髙皇帝為伯霍丘以下七王為兄寳應以下七王為姪太廟廡中木主稱夀春八王為髙伯祖考寳應七王為曾伯祖考禮官誤矣然吾學編作於嘉靖中今去世宗又二世矣廟中乃無所謂諸王木主而臨祭時本寺以黄紙書諸王及諸妃王猶仍舊稱愈誤宜止書本爵為是廟中西廡下設配享四孟歳暮位置皆同祧殿神主歳暮大祫禮祭徳祖𤣥皇帝后懿祖恒皇帝后熈祖裕皇帝后仁祖淳皇帝后仁宗敬天體道純誠至徳𢎞文欽武章聖達孝昭皇帝誠孝恭肅明徳𢎞仁順天啟聖昭皇后宣宗憲天崇道英明神聖欽文昭武寛仁純孝章皇帝孝恭懿憲慈仁莊烈齊天配聖章皇后英宗法天立道仁明誠敬昭文憲武至徳廣孝睿皇帝孝莊獻穆𢎞惠顯仁恭天欽聖睿皇后憲宗繼天凝道誠明仁敬崇文肅武宏徳聖孝純皇帝孝貞莊懿恭靖仁慈欽天輔聖純皇后孝宗建天明道誠純中正聖文神武至仁大徳敬皇帝孝康靖肅莊慈哲懿翊天贊聖敬皇后睿宗等帝后神座同前東西相向兩廡同祧主皆南向冠服藏太廟凡歳暮大祫設祧廟衣冠祭畢則藏之按隆慶六年穆廟升祔上勑禮官議祧廟禮科都給事中陸樹徳言宣宗於穆廟為五世祖不可祧肅皇帝嘗從輔臣議建世廟至十七年始尊廟號祔太廟而世廟之祭不輟如奉睿宗於世廟則不惟遂世宗尊奉之初心而宣宗得免議祧又有以慰睿宗尊祖敬宗之至念下禮官議禮官具議上上曰典禮重大未可輕議其照勑諭行萬厯九年禮科給事中丁汝謙復以請畧曰列聖嘗君臨天下睿宗北面事之一旦與之並列非禮躋武宗之右又非禮且世廟常尊百世不遷宜以睿宗專祭於世廟上曰祔享大禮我世祖親定其何敢議謫汝謙萬厯十三年禮科都給事中萬象春請復建文之陵號正景皇帝之廟享上不允太廟東廡諸王侑享則夀春等十五王按夀春出熈祖於孝陵為伯霍丘下蔡安豐䝉城為夀春子於孝陵為從兄南昌旴𣅿臨淮其同母兄也寳應為霍丘子六安來安都梁英山為安豐子山陽為南昌子昭信為旴𣅿子皆從子也十五王惟夀春霍丘安豐旴𣅿䝉城臨淮六妃配食南昌者文正父也妃王氏不入配洪武二年定十五王侑享四祖廟東廡八西廡七稱夀春為皇伯考霍丘等七王為皇兄寳應等七王為皇姪八年設黄布幄於殿左右左祀楊王皇兄徐王右祀功臣九年定夀春王王妃二十一人侑享於東壁功臣西壁親王功臣不分獻正徳中御史徐文華言族成人而無後者祭終兄弟之孫之身諸王於髙皇帝非兄弟即伯叔至於今五六世矣禮宜祧禮官議不可嘉靖中建九廟以東西廡配九廟灾復同堂異室之制仍祔於兩序如故然其木主猶英廟之舊以夀春與霍丘七王為皇高伯祖考寳應以下七王為皇曾伯祖考世次不合舛謬尤甚萬厯七年太常卿温純言之閣臣而聞於上於是改稱本爵云西廡功臣侑享則武寧王等十七人凡祭品每人一案初洪武二年既定十五王侑廟又祔饗戰殁功臣已又設青布幃於廟庭祀之尋更定功臣十三人令大海通海兩徳勝世傑再成楚國公廖永安七人已卒祔於廟達等六人俟卒進侑八年設黄布幃於殿左右右祀功臣九年定十五王侑享東壁功臣西壁罷永安祀洪熈元年以靖難功臣玉能真榮國恭靖公姚廣孝侑享嘉靖九年中允廖道南言廣孝髠徒不宜入廟移祀大興隆寺即今䕶國寺十年以刑部郎中李瑜議進基位次六王十六年武定侯郭勛乞進其祖英下廷議不可户部侍郎唐胄爭之尤力言廟祀諸臣位次上下且不可易况有無之額敢輒增損勛言往年進基祔享以文臣故舉朝翕然順從臣祖英武臣乃紛然阻忌上是勛言進英祀先是侑享功臣位各以爵及進基伯位公侯上上不喜曰何上基而下英也令禮官考議乃合二廟功臣敘爵於是列英于金鄉侯上列河間東平二王于黔寧王下列基于永義下英未進侑時禮官言禮有功宗之祀漢祭功臣於朝廷魏祀尚書令荀攸於太祖廟唐髙祖至憲宗廟或六七八人或二三四人宋太祖至光宗亦然如魏徵李沆司馬光皆文臣不必皆武功也守成諸君亦各有與享者不必皆創業也我二祖開國靖難有功臣仁宗以後無事武功其間輔贊治平豈無有如魏徵李沆輩者今侑享惟基廣孝二人文臣耳自後六廟缺焉無聞乞下廷議考求六廟文武大臣功在當時澤在後世者進侑廟廷上不允萬厯九年給事中丁汝謙言諸王世次逺宜罷祭祭于墓親王之殤無後而近者宜配凡親王功臣宜列兩廡上以汝謙議睿廟謫汝謙遂未行萬厯十四年太常卿裴應章上言諸王從祖祔食四祖親盡且祧而諸王獨配享百世非所以為殺也夀春等王于太祖為伯為兄太祖南面而伯若兄俯而侑於側非所以為順也列后在享諸功臣同座一堂非所以為别也其以諸王祔祧廟歳祫則祔餘則罷功臣移之廡便上下禮官宗伯沈鯉議曰臣考儀禮諸書與前代故事無親王祔享之儀是太祖以義起者也宗廟之祭祫為重故禮稱彌逺而邇尊時享不可預而預于祫其無乃未安歟竊謂諸王墳墓近皇陵則祔皇陵之廟近祖陵則祔祖陵之廟於禮無嫌亦不失太祖遺意但考洪武四年初享十五王之文曰朕念親親之道無間存歿凡我伯考兄姪悉追封為王伯妣先嫂皆為王妃大夫列祀家廟著為常典臣不敢議罷其仍遵初制序列東廡功臣列西廡惟上裁擇上曰可於是諸王功臣列兩廡遣官分獻如國初制矣太廟建於闕左正殿九間翼以兩廡兩廡之南為二燎爐正殿後為寢殿寢殿後為祧殿各九間正殿南為㦸門上具服小次設於門左㦸門東為神庫西為神厨南為廟門廟門外東南為宰牲亭南為神宫監西為廟街門正殿貯諸帝后衣冠冕旒等服匱而藏之寢殿為同堂異室之制奉安九聖神主祧廟奉藏祧廟神主亦各另有冠服翼善冠黄袍等服四時之享設九廟衣冠於正殿祭畢仍貯匱中歳暮大祫設九祖九宗衣冠於正殿祭畢亦各貯之匱寢殿祧殿皇祖帝后神