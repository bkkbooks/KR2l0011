而大定王室則所以成繼述之孝者何其勤遷武王鎬京之都而永建帝業則所以成創守之功者何其大表章六經垂範萬世禮樂明備教化大行有經天緯地之文親御六飛威振絶漠四裔君長咸奉職貢有保大定功之武光踐寳祚而二紀之治坐致太平晩付皇儲而萬幾之勤不廢總攬至於敬天勤民右文重道親賢逺佞兼有君師之衆善乃若懋賞輕刑畏灾重榖憫農優艾備有帝王之全徳此則自載籍之𫝊未有豐功駿業而可以加兹者也臣某忝以支童託承大徳比已恭建特廟用圖百世不遷兹者加上尊稱期於配天罔極謹奉冊寳上尊諡曰啟天𢎞道髙明肇運聖武神功純仁至孝文皇帝廟號成祖伏惟靈徳在天顧歆廟祐鑒兹㣲悃臨享徽稱保我子孫億萬斯世臣某誠懽誠忭稽首頓首謹言一祝文維孝𤣥孫嗣皇帝某敢昭告於成祖啟天𢎞道髙明肇運聖武神功純仁至孝文皇帝仁孝慈懿誠明莊獻配天齊聖文皇后曰適𤣥孫躬率羣臣加上聖號既畢宣奏之禮用伸燕賀之情惟我皇祖永歆孝念尚享一樂章迎神太和天眷不遲誕降我皇祖夙秉文徳宣昭聖武攘除姦兇戢寧寰宇維典章未備繄孝孫是補大號鴻名卓絶千古寳冊攸躋精禋斯舉將降休兮聖靈騰爐煙兮燎炬尚來格來歆以篤天之祜舉冊寳熈和於穆文祖貽我丕基昊天罔極永言孝思爰薦徽稱以協民彞勒賁琬琰昭我厥辭以昭於萬世神其聽之初獻夀和制帛孔純滌牲腯肥黍稷醴羞蠲潔芬馡穆穆孝孫敬徳淵㣲獻享初陳仰威顔其靡違亞獻豫和干戚武成於昭神功文致太平沕穆皇風樂舞既薦禮儀肅雍奠獻載將致其孚顒願申佑我孝孫萬福攸同終獻康和三爵既登禮秩斯成駿奔就列虎拜盈庭匪臣工之䖍孝孫之徳孔明錫皇釐於普天奠邦家兮永寧徹饌永和古禮之經有儀有節將享既終登歌以徹祀事利成神人胥恱維孝孫之𠂻情猶纒綿其糾結送神安和髙皇謨烈我祖是成誕垂裕於後昆孝孫是徵稽古酌今恭薦兹尊稱奕奕閟宫歳事有恒子子孫孫百世其承之一冊文維年月日孝子皇帝臣某稽首百拜上言臣聞古訓徳莫顯於基命孝莫大乎尊親是故有聖人之徳必膺天命之歸惟天子之孝尤以尊親為至洪惟我明開國百年業承八聖乃小子獲奉郊廟進陟祖位匪我皇考大徳受命以敷錫𦕈躬曷克臻兹顧欲申罔極之恩實乆鬱追崇之典兹欲光於前聞垂之來載不有隆稱顯號其何以表至聖而昭眷命乎恭惟皇考獻皇帝睿明天縱恭儉性成蕩蕩難名道配乎帝堯之大乾乾不息徳比於文王之純學本聖傳心契乎四書六經之㫖國封南服化行於江沱汝漢之濵方憲祖賔遐之後當孝皇在阼之年迎養一辭昭昭乎神明享其孝遺治一疏恢恢乎帝王同其情奉藩二十五年心罔不在王室而昭事上帝之心翼翼如有臨閱世四十四載身罔敢自暇逸而學道愛人之志孜孜不少倦乃若游情翰墨則精究古法非經訓之辭弗書至於怡神宫庭即應接斯須非聖賢之事弗語喜怒不遷賞罰必當有𤼵而中節之和明照無私幽隠必達有無所不通之睿摛辭電發煥然其有文章㝠心天游廓乎其有容徳誠可謂包衆善而難名兼百行而備有者也臣某祇繼遺庥茂承餘烈永惟至恩大徳無物可稱是以恪稽典禮率籲羣心謹奉冊寳更主尊諡曰知天守道洪徳淵仁寛穆純聖恭儉敬文獻皇帝廟號睿宗伏惟聖靈如在皇鑒孔昭膺顯大於無疆與乾坤而同乆永昌祚𦙍攸寧萬邦臣某誠懽誠忭稽首頓首謹言一樂章迎神太和於皇烈考濬𤼵慶源欽明宣哲敦徳允元克昌厥祚以釐我子孫噬薦徽稱惟天徳是尊惟烈考鑒兹臨享如存舉冊寳熈和月吉兮辰良薦鴻號兮受命溥將日皇赫奕兮玉冊輝煌啟中興兮七葉頌貞符兮萬方初獻夀和載清酤兮犧尊瑟笙喤喤兮鐘鼓於論樂一奏兮爵一獻靈來享兮鑒兹薫薫亞獻豫和瑶觴濯兮𤣥酒登懷明徳兮薦椒馨繄昭考兮陟降在庭顧孝享兮靈心載寧終獻康和三獻畢陳八音舉百辟相予祀事毖愛敬極兮揚名始冀皇考兮綏孝子徹饌永和笙鏞止豆籩徹禮莫愆孝靡竭神具醉兮以莫不懌賚我思成兮純嘏是錫降座安和神之來思天路脩神之去思路寢幽幽既安既妥兮靡淹留奠宗祊兮永錫洪庥一祔享祝文維年月日孝𤣥孫嗣皇帝某敢昭告於太祖髙皇帝孝慈髙皇后成祖文皇帝仁孝文皇后仁宗昭皇帝誠孝昭皇后皇髙祖考宣宗章皇帝皇髙祖妣孝恭章皇后皇曾祖考英宗睿皇帝皇曾祖妣孝莊睿皇后皇祖考憲宗純皇帝皇祖妣孝貞純皇后皇伯考孝宗敬皇帝皇考睿宗獻皇帝皇兄武宗毅皇帝孝靜毅皇后曰兹者恭上皇考廟號尊諡禮成爰奉神主謁祖祔祭仰延列聖同賜鑒歆謹此躬祭之誠以伸合享之禮尚享一祔享樂章迎神太和太室巍巍九廟肇祀皇聖居歆惟昭考假只昭假維何欣天倫攸敘宗祏有嚴開萬禩伊始初獻夀和酌彼鬱鬯玉瓚是將敬哉捧盈有飶其香儼皇祖在上八聖在旁合享交欣天容洋洋亞獻豫和樂奏既和禮嚴再獻黄流載觴玉露斯湛烝畀祖考式衎以宴神其醉止用嘉我明薦終獻寧和五齊維醑萬舞盈庭尊祖饗親樂奏禮行式序式和祀事孔明於赫聖靈兮賚我思成徹饌雍和籩豆有踐兮敬徹不遑禮儀卒度兮既敇既匡神之聽之兮昭格洋洋保我孫子兮惠錫無疆送神安和雲輿肅肅兮靈駕歸閟宫侐兮瞻休我其夙夜兮敬敢違願言顧歆兮俎豆光輝附考嘉靖年冊寳慈孝獻皇后事宜一陳設脯醢果酒服素服一正祭日上乗輿至慈寧門外東降輿導引官導上至几筵門外内贊對引導上入典儀唱執事官各司其事内贊奏就位詣前跪上香復位奏四拜陪拜官同典儀唱上冊寶奏詣前奏跪陪拜官跪贊進冊太常官捧冊跪於上右進於上獻訖授内臣捧安於冊案贊進寳太常官捧寳跪於上左進寳於上