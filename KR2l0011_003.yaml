body:
  text: 太常續考卷三春秋社稷事宜社稷壇建于午門之右為制二成四面石階各三級上成用五色土中黄東青南赤西白北驪壇西砌瘞位四面開櫺星門西門外西南建神庫庫南為神厨北門外為拜殿外門亦四座西門外南為宰牲亭一成上東為太社西為太稷皆北向以后土勾龍氏西向后稷氏東向配嵗仲春秋上戊日上親行禮凡國有大事則祭告吳元年太社太稷異壇同壝建于宫城之右北向以勾龍后稷配社石主半埋土中稷不設主命協律郎冷謙考正雅樂音律及鐘磬等器并定樂舞之制令社稷正配位俱用祝文每獻禮先獻太社及配位次獻太稷洪武元年令風雨齋宫望祭三年建祭殿於壇北又北為拜殿以備風雨四年定祭太社太稷正位用祝文配位不用六年八月奉㫖凡祭祀受胙不要神前祭肉上旋割取便從明日祭社稷為始別用一犢先割一胙安在酒尊左右候賜胙時捧上來與受胙者十年上曰古人以社為五土之神稷為五榖之神土主𤼵生五榖用之以生而乃一圍之中各壇而祭是土榖不合於生生之意也行禮之時先社固宜而又先奠社配乃行稷神之禮此果合人情乎乃更祀社稷于闕右同壇同壝埋石主於壇中更為社稷神牌而丹漆之臨祭并設自奠帛至終獻皆同時行禮是年以禮官張籌議罷勾龍后稷配仁祖西向三十二年以後撤仁祖配太祖永樂中京師壇成位置如故仁宗又奉成祖配嘉靖九年世宗皇帝諭禮官奉太祖成祖配位藏太寢仍以勾龍后稷配洪武元年太祖命省臣議於社稷上創屋以備風雨翰林學士陶安奏禮天子太社必受風雨霜露以達天地之氣若亡國之社則屋之不受天陽也今於壇創屋非宜若祭而遇風雨則於齋宫望祭從之二月上戊日祭太社稷一前期十日本寺題請聖駕詣社稷壇致祭并題前一日夜開長安等門放樂舞生并陪祀官員一本寺委協律郎提調樂舞生執事于太和殿朝夕演習禮樂一前期八日行手本知㑹鴻臚寺于前期三日請陞殿奏祭祀一前期四日行掲帖知㑹司禮監奏祭祀一前期三日本寺官具公服于皇極殿候鳴鞭訖跪奏云太常寺卿臣某等謹奏本年二月某日祭至聖先師孔子某日傳制遣某官行禮某日祭太社太稷本日子時恭候聖駕致祭文武百官自某日為始致齋三日請㫖承㫖叩三頭一揖一躬退如其日免朝則具本題知同日屬官率鋪排執御仗紗燈進齋戒牌銅人于文華殿東九五齋北向仍出示長安門一齋牌年二月某日祭至聖先師孔子某日祭太社太稷自某日午後沐浴更衣某日為始致齋三日一東西長安門告示太常寺為祭祀事照得某年二月某日祭先師孔子某日祭社稷百官自某日午後沐浴更衣於本衙門宿歇某日為始致齋三日其祭先師孔子文官六品以下先期赴廟瞻拜應該陪祀官員除年老殘疾瘡疥體氣刑餘喪過之人不與外文官五品以上六科都給事中祭社稷文官五品以上六科都給事中武官四品以上皇親指揮千百户等官各具祭服伺候陪祀合行告示知㑹是日早樂舞生詣社稷壇并拜殿各門燒香本寺官詣太和殿演禮樂畢詣犧牲所看牲一行掲帖知㑹司禮監奏省牲如次日不朝則不具掲帖一前期二日本寺卿同光禄寺卿具朝服于中極殿跪奏云太常寺等衙門卿臣某等謹奏本月某日臣等恭詣社稷壇省牲請㫖承㫖不叩頭一躬退如其日不朝則具本題知一行掲帖知㑹司禮監填祝版一前期一日本寺卿同光禄寺卿省牲畢同具本復命同日早博士恭捧祝版于東平䑓候上填御名訖捧安于社稷神庫同日本寺官率厨役洗玉爵祭器竪庭燎午後率樂舞生陳設樂器夜二鼓奉安神牌陳設籩豆牲隻太社之神居東北向太稷之神居西北向勾龍氏居東西向后稷氏居西東向配勾龍氏后稷氏二案陳設俱同惟無玉三爵皆用磁一儀注祭日子時上乗輿繇西闕門入至壇門東降輿導引官導上至具服繇拜殿右門出内贊對引官導上行典儀唱樂舞生就位執事官各司其事内贊奏就位位設于北櫺星門外典儀唱瘞毛血唱迎神奏樂内贊奏陞壇導上陞至太社香案前奏跪奏搢圭奏上香奏出圭導上至太稷香案前儀同太社奏復位近年多臨時遇風雨請㫖本寺卿代上香本寺少卿跪上勾龍氏后稷氏二爐香樂止奏四拜傳贊百官同典儀唱奠玉帛行初獻禮奏樂執事官捧玉帛爵于神位前跪奠訖樂暫止内贊奏跪傳贊百官皆跪典儀唱讀祝讀訖樂復作内贊奏俯伏興平身傳贊百官同樂止典儀唱亞獻禮奏樂執事官捧爵詣各神位前跪奠訖樂止典儀唱終獻禮奏樂儀同亞獻樂止本寺卿立祝卓前東向唱賜福胙光禄寺官捧福酒胙下至御拜位跪進于上右内贊奏跪奏搢圭奏飲福酒飲訖奏受胙受訖奏出圭奏俯伏興平身奏四拜傳贊百官同典儀唱徹饌奏樂樂止典儀唱送神奏樂内贊奏四拜傳贊百官同樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣瘞位唱望瘞奏樂捧祝帛饌官下級奏禮畢導引官導上囘具服殿易祭服囘宫如遇風雨上于拜殿行禮一祝文維年歲次二月朔日嗣天子御名敢昭告于太社之神太稷之神惟神贊輔皇祇發生嘉榖粒我烝民萬世永賴時當仲春禮嚴告祀謹以玉帛牲齊粢盛庶品備兹瘞祭以后土勾龍氏后稷氏配神尚享髙皇御製樂章樂七奏舞八佾迎神廣和予惟土榖兮造化功為民立命兮當報崇合四一四尺四合尺六工尺一尺四合尺民歌且舞兮朝雍雍備筵率職兮侯迓迎一尺一尺工六工尺合四一四尺四合四想聖來兮祥風生欽當稽首兮告年豐一尺工尺六工尺工尺合四尺一四合奠玉帛初獻夀和武功之舞氤氲氣合兮物遂䝉民之立命兮荷隂功合四一四尺四合尺六工尺一尺一四合予將玉帛兮獻微衷初斟醴薦兮民福洪工尺一尺工尺六工合四一四尺一四合