body:
  text: 太常續考卷五歷代帝王事宜廟建于都城之西阜城門內名曰景德崇聖之殿東西兩廡兩廡之南砌二燎爐殿後為祭器庫殿前為景德門門外東為神庫神厨宰牲亭鐘樓西為住持房又前為廟街門門外東西二牌坊曰景德街殿中奉安太昊伏羲氏炎帝神農氏黃帝軒轅氏東奉安帝金天氏帝髙陽氏帝髙辛氏帝陶唐氏帝有虞氏西奉安夏禹王商湯王周武王又東奉安漢髙祖皇帝漢光武皇帝又西奉安唐太宗皇帝宋太祖皇帝東廡上風后臯陶龍伯益傅説召公奭召穆公虎張良曹參共一壇西廡上力牧夔伯夷伊尹周公旦太公望方叔蕭何陳平共一壇東廡下周勃馮異房玄齡李靖李晟潘美嶽飛許遠共一壇西廡下鄧禹諸葛亮杜如晦郭子儀曹彬韓世忠張浚張巡共一壇歲仲春秋本寺題請遣大臣一員行禮四員分獻子午邜酉年秋傳制遣樂舞生齎香帛祭各帝王陵寢罷廟祭先年傳制俱以七月朔日萬厯四年奉聖旨朔日傳制於廟享有妨今次暫免以後另擇日行上初即位則遣官詣帝王陵祭告本廟住持一名焚修四名俱於樂舞生內選戒行端方者充之以奉香火每名領本寺下帖一張廟戶二十名洪武元年祀三皇用太牢以勾芒祝融風后力牧配四年令天下立三皇廟歲春秋祭已而令祭於陵是年命官參考歷代聖帝賢王但在中原安養人民者三十四君合祀之擇名臣從祀六年禮官言古帝王有父子祖孫一廟合祭非禮乃别立歷代帝王廟同堂異室歲春秋祀三皇五帝禹湯文王武王漢髙祖光武唐髙祖太宗宋太祖元世祖其守成賢君令所在有司歲春秋祭陵七年塑帝王衮冕坐像上曰伏羲神農未有衣裳之制勿加冕服二十年以武成王從祀於廟去王號二十一年禮官擇上歷代名臣始終全節者三十五人從祀帝王廟上曰趙普負太祖不忠不可祀元穆呼哩安圖祖也不可祀孫而去祖可祀穆呼哩罷安圖既祀巴延阿珠可勿祀又曰漢陳平馮異宋潘美皆宜祀未幾上曰文王雖基周命終守臣節唐髙祖雖有天下本太宗力也可勿祀祀於陵增祀隋文帝是年廟火改建於欽天山之陽去隋文帝又增歷代帝王一壇於大祀殿環墠之外以孟春從祀天地本廟惟仲秋遣官祭子午邜酉年秋傳制祭陵停廟祭嘉靖九年罷歷代帝王南郊從祀禮官請加南京廟春祭上不從令建廟京師歲仲春秋祭罷南京廟祭十年春廟未成上祀之文華殿廟初成上親至廟祭是年修撰姚淶請罷元世祖祀禮官議不可上從禮官議二十四年給事中陳棐又言之乃罷祀元世祖并罷從祀穆呼哩等五人二月某日祭歷代帝王前期十日本寺題欽遣大臣一員行禮四員分獻本候旨下各行手本知會一本寺委協律郎提調樂舞生執事於太和殿朝夕演習禮樂一前期七日行手本知會鴻臚寺於前期二日請升殿奏祭祀一前期三日行揭帖知會司禮監奏祭祀一前期二日本寺官具公服於皇極殿候鳴鞭訖跪奏云太常寺卿臣某等謹奏本月某日祭歷代帝王文武百官於某日致齋一日請旨承旨叩三頭一揖一躬退如其日免朝則具本題知是日屬官率鋪排執御仗紗燈進齋戒牌銅人於文華殿東九五齋北向仍出示長安門一齋牌某年二月某日祭歷代帝王自某日午後沐浴更衣某日致齋一日一東西長安門告示太常寺為祭祀事照得年二月某日祭歷代帝王文武百官自本月某日午後沐浴更衣於本衙門宿歇某日致齋一日其陪祀官員以下與大祀同同日本寺卿同光祿寺卿具本奏省牲本寺官詣太和殿演禮樂畢詣犧牲所看牲一前期一日本寺卿同光祿寺卿省牲畢具本復命同日早博士捧祝版奉安於帝王廟神庫同日早樂舞生詣廟丹墀各門燒香午後本寺官率樂舞生陳設樂器厨役洗祭器奉安神牌陳設籩豆牲隻一陳設漢髙祖皇帝漢光武皇帝籩豆二案牲三共一壇帝陶唐氏帝髙陽氏帝金天氏帝髙辛氏帝有虞氏籩豆五案牲三共一壇炎帝神農氏太昊伏羲氏黃帝軒轅氏籩豆三案牲三共一壇商湯王夏禹王周武王籩豆三案牲三共一壇唐太宗皇帝宋太祖皇帝籩豆二案牲三共一壇一儀注祭日子時導引官導遣官從右戟門入贊詣盥洗所贊搢笏盥訖贊出笏典儀唱樂舞生就位執事官各司其事分獻官陪祀官各就位贊引贊就位位設於丹墀典儀唱迎神奏樂樂止贊引贊四拜傳贊衆官同典儀唱奠帛行初獻禮奏樂執事捧帛爵詣各神位前贊引贊升壇導遣官從左門入至中爐贊跪贊搢笏贊上香至左爐右爐俱贊上香畢仍導至中贊獻帛贊獻爵贊出笏贊詣讀祝位樂暫止贊跪傳贊衆官皆跪贊讀祝讀訖樂復作贊俯伏興平身傳贊同贊復位樂止典儀唱行亞獻禮奏樂儀同初獻惟不上香獻帛讀祝樂止典儀唱行終獻禮奏樂儀同亞獻樂止典儀唱徹饌奏樂樂止典儀唱送神奏樂贊引贊四拜傳贊同樂止典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位奏樂遣官退立於拜位之東捧祝帛饌官出中門贊禮畢樂止其分獻官於典儀唱奠帛行初獻禮時各贊引引分獻官詣東西廡神位前贊跪贊搢笏贊上香贊獻帛贊獻爵贊出笏候殿內贊跪分獻官跪於各神位前讀祝畢各贊俯伏興平身贊復位亞終獻禮儀俱同初獻惟不上香獻帛讀祝餘隨遣官行如上親祭從中門入位設於殿內終獻後增答福胙餘儀同前一祝文維年月朔日皇帝御名謹遣致祭於太昊伏羲氏炎帝神農氏黃帝軒轅氏帝金天氏帝髙陽氏帝髙辛氏帝陶唐氏帝有虞氏夏禹王商湯王周武王漢髙祖皇帝漢光武皇帝唐太宗皇帝宋太祖皇帝曰仰惟諸帝昔皆奉天撫世創治安民我皇祖景慕不忘春秋致祭著在令甲恭修恆祀時維仲春謹以牲幣庶品用享列聖敬體皇祖追報之虔惟諸帝鑒臨來格於斯庶副豫誠之至尚享一樂章樂七奏舞八佾迎神雍和仰瞻兮