body:
  text: 太常續考卷六五祀之禮洪武二年禮部尚書崔亮奏周官天子五祀曰門曰戶人之所出曰中霤人之所居曰竈曰井人之所養故杜佑曰天子諸侯必立五祀所以報德也今擬依周官五祀止於歲終臘享通祭於廟門外上用其議歲暮享太廟時五祀並列廟西廡下東向太常寺官行禮自永樂以來五祀於四孟及季夏始又各有分祭戶用孟春宫內祭竈孟夏光祿寺祭中霤季夏土旺後戊日奉天門外文樓前西向祭門孟秋午門前祭井孟冬宫內祭皆內官行禮洪武二年九月乙巳詔以司中司命司民司祿及夀星五神為中祀命翰林院撰祝文以祭蓋夀星舊曾有祀餘四司肇祀於此尋廢五祀今定孟春時享日祭司戶於宫門外道左西向孟夏時享日祭司竈於大庖前中道南向季夏土王用事日祭中霤於文昭閣前西向孟秋時享日祭司門于午門外西角樓東向孟冬時享日祭司井於大庖井前南向戶竈門井各於奏太廟四孟時享日面奏遣內官行禮中霤之神則専具本題請遣內官行禮歲暮祫祭日合祭五祀於太廟丹墀西東向本寺題遣本寺少卿行禮洪武二年尚書崔亮請歲終祭五祀於廟門外從之後又令立春祭司戶立夏祭司竈季夏土王用事日祭中霤立秋祭司門立冬祭司井歲暮合祀九年定太廟時享孟春用上旬吉日夏秋冬三孟用朔日自是分祭戶竈門井隨時享太廟日行中霤用季夏土王日合祀用歲暮如故太廟祫祭日祭五祀之神前期十日本寺題本遣本寺堂上官行禮前期一日陳設於太廟丹墀西東向中霤之神司戶之神司竈之神司門之神司井之神司戶司竈司門司井之神四案陳設俱同一儀注至日獻官於司尊卓東北隅向北立候太廟內奏迎神樂將止贊引引獻官至中霤神前贊四拜贊復位太廟內行初獻禮贊引贊諸神位前贊搢笏贊獻帛贊獻爵四壇執事各獻帛爵訖贊出笏贊詣讀祝位贊跪贊讀祝讀訖贊俯伏興平身贊復位典儀唱行亞獻禮行終獻禮儀俱坰初獻惟不獻帛讀祝太廟內還宫樂作贊引引獻官至中霤神前贊四拜贊復位太廟內唱詣燎位執事官詣各神前捧祝帛詣燎所贊禮畢一祝文維皇帝遣太常寺某致祭於中霤之神司戶之神司竈之神司門之神司井之神惟神安養衛護各著厥功兹當歲暮特以牲醴報祭神其鑒知尚享一本寺出祝帛等物祝文一道禮神帛五段降香五斤又五炷四兩燭四枝一兩燭十枝胡桃二十斤栗子三十斤紅棗二十五斤荔枝圓眼各十五斤祝文本紙二張牌位表黃紙五張包香帛黃咨紙八張白咨紙五張酒十瓶山羊五隻豬五口一合用祭器神牌五座黃紙書磁爵十五個紅木果盤二十五個篚箱五個二牲匣五副酒尊三個錫壺一把盥盆一個香爐五個燭臺五對紅卓十七張方燈六座拜褥一條一辦祭官一員一執事樂舞生贊引一人讀祝一人捧帛五人執爵五人司尊一人一供祀厨役見太廟下孟春時享太廟日祭司戶之神遣內官行禮本寺於奏孟春時享太廟日面請前期一日陳設於宫門外道左西向司戶之神一案陳設與歲暮同一儀注祭日贊引導遣官行教坊司作樂贊引贊詣盥洗所贊搢笏洗訖贊出笏贊就位贊詣前贊搢笏贊上香贊出笏贊復位贊四拜贊奠帛行初獻禮贊詣神位前贊搢笏贊獻帛贊獻爵贊出笏贊復位贊跪贊讀祝讀訖贊俯伏興平身贊行亞獻禮行終獻禮儀俱同初獻惟不獻帛讀祝贊四拜贊焚祝帛執事捧祝帛行贊詣焚祝帛所導遣官至燎所焚半贊禮畢一祝文維皇帝遣致祭於司戶之神曰職司於户謹出入之行藏晝開暮闔衛護無私時維孟春謹以牲醴致祭神其鑒知尚享一本寺出祝帛果品牲醴等物祝文一道禮神帛一段降香一斤又一炷八兩燭二枝四兩燭二枝一兩燭五枝胡桃四斤栗子六斤紅棗五斤荔枝圓眼各三斤祝文本紙二張包香帛黃咨紙三張白咨紙一張神牌表黃紙一張酒二瓶豬一口山羊一隻一執事人員辦祭官一員執事樂舞生五人前三日於司禮監演供祀厨役見太廟下四月初一日祭司竈之神位設於內府大庖厨前中道南向一應合行事宜並同司戶一祝文維皇帝遣致祭於司竈之神曰日用飲食必資於竈爨有常所神實司之時維孟夏謹以牲醴致祭神其鑒知尚享六月土王用事日祭中霤之神前期十日本寺題本遣內官行禮并題前一日夜開長安等門放品物并官員厨役人等本位設於文昭閣前西向陳設與歲暮本案同儀注同戶竈一祝文維皇帝遣致祭於中霤之神曰室之中霤神司其職居中向明照察無私時維季夏謹以牲醴致祭神其鑒知尚享一本寺出品物與司戶同惟加四兩燭二枝二兩燭二枝代栗子以菱米一辦祭官一員典簿一員一執事樂舞生五人厨役二十五名七月初一日祭司門之神位設於午門外西角樓東向一應合行事宜俱同戶竈一祝文維皇帝遣致祭於司門之神曰職司於門謹出入之行藏晝開暮闔衛護無私時維孟秋謹以牲醴致祭神其鑒知尚享品物代栗子以菱米十月初一日祭司井之神位設於大庖井南向一應合行事宜俱同司戶一祝文維皇帝遣致祭於司井之神曰實司兹井源泉潔清其用日新以供飲食時維孟冬謹以牲醴致祭神其鑒知尚享三皇廟建於太醫院之北名景惠殿前為景咸門門東為神庫西為神厨殿中奉安伏羲神農黃帝皆南向勾芒祝融風后力牧東西相向配東廡僦貸季鬼臾區天師岐伯俞跗伯髙少俞少師桐君大乙雷公馬師皇伊尹神應王扁鵲倉公淳于意張機西廡王叔和華陀皇甫謐巢元方抱朴子葛洪真人孫思邈藥王韋慈藏啓玄子王氷錢乙朱肱劉完素張元素李杲朱彥修從祀每歲仲春仲冬上甲日本寺題請遣禮部堂上官一員行禮太醫院堂上官二員分獻三皇之祭自世宗皇帝始嘉靖二十一年建今廟按本寺志云三皇之祭永樂初仍元之舊至嘉靖二十一年以廟制湫隘弗稱始命展拓從祀僦貸季二十八人時禮官所議增也然查會典總覽並無祭三皇之文豈二十一年以前太醫院原有廟祭而不係祀典所載邪隆慶四年春禮部侍郎王希烈以三皇既祭於帝王廟請罷太醫院廟祭而專遣太醫院官祭先醫上不允嘉靖初年創建聖濟殿祭先醫之神殿在文華殿後每歲仲春冬上甲日本寺題請遣太醫院堂上官行禮十一月上甲日祭三皇之神前期十日本寺題本遣禮部堂上官行禮太醫院堂上官二員分獻甲屬東方木取生氣也前期一日陳設炎帝神農氏黃帝軒轅氏籩豆二案陳設俱同三案共牛一羊一豕一少俞至馬師皇五位共一壇伊尹至張機四位共一壇陳設俱同東廡三壇共設素帛一段西廡王叔和抱朴子五位孫思邈至朱肱五位劉元素至朱彥修四位共三壇陳設與東廡同一儀注祭日子時贊引導遣官行教坊司作樂贊詣盥洗所贊搢笏盥訖贊出笏典儀唱執事官各司其事贊引贊就位典儀唱迎神贊四拜典儀唱奠帛行初獻禮贊引贊升壇引至中案贊跪贊搢笏贊上香引至左爐右爐俱贊跪贊上香復引至中案贊獻帛贊獻爵贊出笏贊詣讀祝位贊跪贊讀祝讀訖贊俯伏興平身贊復位典儀唱行亞獻禮贊升壇引至中案贊搢笏贊獻爵又贊出笏贊復位典儀唱行終獻禮儀同亞獻唱徹饌唱送神贊引贊四拜典儀唱讀祝官捧祝掌祭官捧帛饌各詣燎位捧祝帛饌出贊禮畢分獻官儀一祝文維皇帝遣致祭於太昊伏羲氏炎帝神農氏黃帝軒轅氏曰仰惟聖帝繼天立極開物成務夀世福民尤重於醫所以贊帝生德立法配品惠我天民功其博矣時維仲冬特修常祀尚冀默施冥化大著神功深資妙劑保和朕躬期與一世之生民咸蠲疾疚躋於仁夀之域以永上帝之恩不亦丕顯矣哉以勾芒氏之神祝融氏之神風后力牧氏之神配尚享一本寺庫出制帛香燭果品等物祝版一片禮神帛三段素帛四段細香二斤降香六斤又八炷八兩燭十枝四兩燭十三枝二兩燭三十二枝一兩燭五枝芡實五斤十二兩栗子十五斤八兩紅棗十二斤八兩榛仁十三斤六兩菱米十四斤四兩香油五斤砂糖一斤八兩白鹽三斤鹽磚一斤四兩大笋七兩花椒四兩茴香四兩蒔蘿二兩醢魚五斤鰝魚五尾祝版本紙二張包版黃白榜紙各一張包香帛黃咨紙十張白咨紙七張木炭五斤酒二十三瓶葦把四束每束重二十五斤燒香木炭五十斤一執事官員樂舞生導引官二員贊引官一員對引官一員讀祝官一員司香官二員典儀一人分獻贊引二人捧帛七人執爵九人司尊四人省牲二人俱祭服供事厨役八十一名十一月上甲日祭先醫之神前期十日本寺題本遣太醫院堂上官行禮一儀注贊引導遣官行教坊司作樂贊詣盥洗所贊搢笏盥訖贊出笏贊就位贊詣前贊搢笏贊上香贊出笏贊復位贊四拜贊奠帛行初獻禮贊詣神位前贊搢笏贊獻帛贊獻爵贊出笏贊復位贊跪贊讀祝讀訖贊俯伏興平身贊行亞獻禮行終獻禮儀俱同初獻惟不獻帛讀祝贊四拜贊焚祝帛執事捧祝帛出贊詣焚祝帛所導遣官至燎所燎半贊禮畢一祝文維皇帝遣致祭於先醫之神曰生人之德莫重於醫神能立法配品藥此羣生功其博矣時維仲冬特修常祀尚冀默施冥化大著神功期盡世之生咸蠲疾疢以永上帝之仁於神之靈不亦丕顯矣哉尚享一本寺庫出制帛香燭果品等物祝文一道禮神帛四段青一白三降香一斤又一炷八兩燭二枝四兩燭四枝二兩燭十枝一兩燭五枝芡實一斤四兩栗子二斤紅棗一斤六兩榛仁一斤六兩菱米一斤八兩香油一斤白鹽八兩鹽磚四兩大笋一斤花椒一兩茴香一兩蒔蘿五錢醢魚一斤鰝魚一尾木炭二斤祝文本紙二張包香帛黃咨紙五張白咨紙四張酒三瓶一執事人員辦祭官一員執事樂舞生五人厨役十三名三皇先醫共用稻米六升黍米一斗二升粱米六升稷米一斗二升白麵蕎麥麵各十斤蔥菁菜芹菜韭菜各一捆醬一罐木柴一千五百斤犢二隻用騂豬七口北羊四隻鹿一隻兔十二隻二月上甲日祭三皇先醫之神一應合行事宜俱與十一月同一祝文俱改時維仲冬為時維仲春火神廟廟建於後門之北橋西大門向東曰敕建火神廟門前大牌坊一座曰離德昭明左右鐘鼓樓二座門內小牌坊一座正殿向南曰熒􅥈寶殿內供火德之神對殿內供靈官東西配殿內供火祖火師之神西殿伏魔殿四角四小殿二門內萬夀景命閣上供玉皇上帝下供萬夀雷壇三霄老子三十六天將後斗母閣周圍羣樓上下供奉一切神祗西為道房一所住持夥居東至御路西至海河每歲六月二十三日遣本一儀注與先醫同一祝文維皇帝遣致祭於司火之神曰惟神令司赤帝德炳離明恭屆良辰肇修專祀鑒兹特典綏我蒸民尚享一本寺庫內出香燭帛果品等項祝版一片禮神帛一段降香一包又一炷四兩燭二枝二兩燭二枝一兩燭二枝五錢燭三枝酒二瓶胡桃四斤栗子六斤紅棗五斤枝圓各三斤包版包香黃白咨紙共七張木柴一百斤羊一隻豕一口一辦祭官一員贊禮官一員讀祝官一員對引官一員一執事樂舞生八人厨役八名樂用教坊司祭畢本寺行禮官復命奏式見前惟換月日官銜所祭神號如其日免朝則具本靈明顯佑宫宫建於海子橋之東中塑北極佑聖真君神像東西為配殿前為敕建靈明顯佑宫門門左為四神祠前為大門門外有牌坊每萬夀聖節及三月三日九月九日本寺並題請遣本寺堂上官行禮每月朔望皆有祭亦本寺堂上官行禮但不題遣國初以天兵所向神多隂佑建廟于雞鳴山以祀永樂十三年京師建真武祠𢎞治二年改祠為廟正德二年又改為靈明顯佑宫本宫住持正德以前亦於樂舞生內選戒行端方者充之以奉香火嘉靖四年禮部覆奉欽