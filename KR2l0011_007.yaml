body:
  text: 太常續考卷七一太常寺寺建於後府之南通政司之北坐西向東中為寅清堂堂左為博士廳右為典簿廳後為川堂川堂左右為少卿官舍後為後堂後堂左北為卿官舍後為香帛庫前公亭三間北為柴庫左為巡庫房澆燭房右為祭器祭品庫香帛庫之後正西及南北俱為寺丞官舍寅清堂中為甬道上建小儀門前為二門二門內左為備贊讀房右為協律郎房甬道傍兩廊北為祭祀科南為祭器科科東為江東土地祠又東為提點知觀壇陵官止舍儀門外南為典簿官舍北為博士官舍東為寫祝版房及寫書房三間抄文房一間守門房一間右為巡風房協律贊禮司樂官俱止其中吳元年設太常寺正三品衙門凡朝廷朝會贈諡册封冠婚喪祭等項俱本寺講究儀式計量物料移文各該衙門施行其禮樂祭祀宴賞犒賚賓客工匠俱𨽻本寺洪武元年定官制本寺止掌天地宗廟社稷山川神祇等祭祀餘分𨽻各衙門三十年改司為寺文皇帝都燕建今署稱行在太常寺正統六年詔去行在二字正官卿一人少卿二人寺丞二人國初設卿一人少卿二人司丞二人洪武三十年改司丞為寺丞是後增損不常卿天順八年景泰六年俱二人成化二十年三人少卿景泰六年𢎞治五年俱三人寺丞正統九年成化十三年俱三人成化二十三年𢎞治十一年俱四人至世宗改建郊廟制禮作樂官取其備故嘉靖十四年卿三人十五年寺丞六人十八年以行大享禮又添設寺丞四人二十七年吏部題準本寺添設員缺不補三十年大報吏部題本寺堂上官仍舊五員奉旨寺丞仍加三員隆慶元年裁堂上官為五員如舊制其提督四夷館少卿一人止帶本寺官銜隨本寺關支俸薪首領官典簿一員國初典簿二員𢎞治中間增至三員隆慶三年裁為一員屬官博士二員協律郎三員贊禮郎十八員司樂八員冠帶樂舞生四十八名國初協律郎二員贊禮郎六員司樂二員𢎞治中增協律郎贊禮郎司樂等官十二員嘉靖中至一百二十餘員自九廟大享禮不行幾更議裁定為協律郎五員贊禮郎三十三員司樂三十九員共七十七員隆慶三年又裁協律郎贊禮郎司樂為今額而以見裁協律郎贊禮郎司樂楊大愚等二十七員給冠帶在寺供祀候補正額員缺又以選中應補贊禮郎司樂樂舞生二十名給冠帶協供祭祀有缺則補五年十月內本寺卿李題禮部覆議本寺一應供事既以七十七人為額今李得明等四名已逃若楊大愚等二十四名頂補正額已盡則又不足七十七人之數以後楊大愚等有缺亦許增補冠帶樂舞生與正額二十九員共足七十七名而止祭祀科令史一名典吏二名祭器科令史一名典吏二名厨役一千三百名宰牲十五牌每牌十名共一百四十九名內有一牌九名宰鹿兔二牌每牌十名共二十名蒸作十五牌每牌十名共一百五十名茶食十五牌每牌十名共一百五十四名內一牌多二名名內二牌每牌多一修香一牌十名澆燭一牌十名供祀四十六牌每牌十名共四百六十二名內二牌每牌多一名著壇共十九牌每牌九名共一百七十四名內三牌每牌多一名鋪排八牌每牌十一名共八十八名宫監看庫一一牌每牌十一名共二十二名本寺看庫九名把門十八名看牙牌三名看祭服二名貼精膳司跟用答應厨子四名已上二十四牌並各項雜差厨役共一千三百名內有神宫監直爐薪水三百名本寺貼並班皂火房吏書寫祝版文抄寫共用見應郊廟山陵供祀當差共用本寺跟用七十四名在外正堂十三名又左右少堂各九名左右丞堂各六名又北廳十二名南廳十四名又堂廳火房共五名於每名俱有厨役二名幫貼外每月南廳曾添工食出一千三百名之內吳元年設齋郎百餘名以供郊廟之祀後更為厨役起取山西河南等處曽習厨業并身無疾過者充之免其雜差後定四百名永樂中增二百名景泰六年增三百名成化十五年增三百名𢎞治五年增三百名共一千五百名嘉靖二十九年言官為去冗食題革二百名三十四年題革一百名三十九年又題革一百名隆慶元年又題革五十名纍朝事例凡厨役在逃未及三月者收役過者送問有私逃原籍潛住者許里甲首官解部逃回三次以上者發口外為民有父母原籍病故者查明給引奔喪限十箇月復役有刑餘喪過者不許登壇有犯笞杖者納鈔復役有經法司的決者改撥光祿寺當差正德六年奏準的決者徑革為民不改撥光祿寺戶部為遵奉明旨裁汰中書及太常寺光祿厨役俸薪糧石以明節省以濟空匱事廣西清吏司案呈抄蒙本部案驗該本部題陜西清吏司案呈崇禎元年十月十五日奉本部送户科抄出福建道監察御史馬如蛟題為殷憂所以啓聖力行乃可奏功等事崇禎元年十月十一日奉聖旨為治全在力行曩來怠窳積習殊可痛恨錦衣冒濫中書溢額并厨役宜汰冗官宜裁其已奉旨的著上緊查汰裁革在京限本月內回奏匠作官役虛糜即著該部作速清理不得稽遲再滋弊蠧該衙門知道欽此欽遵抄出到部送司又據太常寺回稱本寺厨役舊額一千三百名內除神宫監直爐薪水厨役三百名又看庫寫字厨役二十二名據該監揭稱俱係禮部題奉欽準専供太廟等廟景神等殿社稷等壇其地方遼濶內藏金玉祭器錢糧巡守時刻不暇一遇告報祭祀僅足支撑又增神宗光宗熹宗三廟錢糧無人看請本監撫諭諸役協應苦實堪憐所有陵寢墳園較昔倍增厨役仍照千人合宫監僅止一千三百人多遇祭祀同日差多人少萬不得已貼彼應此捉襟露肘今據神宫監并本寺簿博兩廳再四查核仍令逐一分派備造文册呈覆等因各到部送司該本司查得大明會典太常寺厨役原係題準一千三百名迄今並未加增今奉旨清查而該寺屢稱人役尚在不敷無可議汰及查册載欵項委屬差多人少合照來文并光祿寺裁定厨役一併付陜西司類覆等因遵奉明旨崇禎二年正月十八日本部尚書畢等具題二十一日奉聖旨這裁定光祿太常寺厨役名數及兩殿中書儒士俸糧定數挨支俱依議仍永為額例不得輒議增加本內錯開銀數查明另奏觖字錯寫改正行該衙門知道欽此欽遵抄出到部抄案到司案呈到部擬合就行為此合劄該寺即便遵照本部覆奉明旨內事理欽遵施行一神樂觀觀建于圜丘壇之西坐西向東觀前有門題曰神樂觀中為殿演樂其中南北兩廊殿旁為左右門又後為玄帝殿殿後南北俱有廊房以貯樂器及官生袍服提點官廨建于殿之西前為門內為儀門中為公座左右為知觀房後為提點房永樂年建提點一員知觀二員樂舞生一千一百五十三名吳元年七月命選道童年少俊秀者充雅樂生洪武初命選道童為樂舞生後以古制文武生俱用公卿子弟乃令樂生用道童文舞生於教官學生內武舞生於軍職舍人內選用十二年詔神樂觀道士許養徒弟其餘庵觀不許十三年又詔公侯及諸武臣子弟習樂舞生之事又令禮部揀選樂舞生有過者疾病者放歸為民後又有旨凡民間聰俊兒男多替我收養些是我朝廷供祀急用的與天下宫觀道士不同欽此遂額設樂舞生六百名內選聲音洪亮禮度嫻熟者分為典儀通贊掌樂教師永樂十八年都燕存留三百名於南京三百名隨駕續添至五百二十七名嘉靖五年世廟添二百一十五名十年建太歲神祗壇添二百二十九名十五年建九廟添一千二百二十九名共二千二百名二十五年禮部為去冗食查革四百四十一名二十九年言官題革四百零六名三十年言官條陳革二百名止存一千一百五十三名隆慶三年裁減協律郎等官見裁官二十八員革為冠帶樂舞生又於一千一百五十三名內應補贊禮郎司樂者二十名八十一名供事既以七十七人為額先補正額亦許增冠帶樂舞生補之是後冠帶樂舞生以四十八名為額在一千一百五十三名之外膳夫十名舊規三十二名蓋為神樂觀官生供饌而設後罷會饌嘉靖二十二年止留十名守倉庫長生觀住持二名東園住持一名西園住持一名焚修一名帝王廟住持一名焚修四名城隍廟住持二名焚修七名以上五處住持焚修俱于樂舞生選戒行端方者充之以奉香火太常寺齋署萬厯三年三月建署于神樂觀北廊倉門首坐西向東正房五間南北鑽山二間南北兩鑲房各三間正房前為二門一座二門前為大門一間大門兩傍共房四間每大祀本寺堂上官齋宿其中其北鑽山二間久因連年雨水坍塌無存基址尚在犧牲所所建于神樂觀之南坐北向南正房十一間中五間為大祀牲房即正牛房左三間為太廟牲房右三間為社稷牲房按山川罷祭既久而本所正牛房右三間仍稱山川房此因襲之誤也宜和本寺志改稱社稷牲房為是正房前為儀門又前為大門儀門西南遇視牲之日設小次大門東西各為連房十二間兩連房之北各為晾牲亭三間東晾牲亭之東為糯稻榖倉三間西晾牲亭之西為糖倉三間兩倉之北為東西二角門東角門北為山羊房五間北羊房五間又北為暖屋滌牲房五間又北為倉庫五間西角門北為山羊房五間北羊房五間又北為糯稻榖倉二間看牲房一間黃豆倉二間官廳三間正牛房之北為官廨十一間廨東為兔房三間又東為鹿房七間鹿房前亦為晾牲亭三間又前為周圍石柵欄官廨西為便門便門之西又為官廨四間又西為小倉三間東羊房後為新牛房後牛房十間養中祀小祀牛草房十五間又向北房三間上視牲日大臣止其中傍為厨房二門西羊房後正房五間為大祀豬圈西房十間為中祀小祀豬圈房前為晾牲亭二間豬圈之北為井又北為草厰洪武二年置神牲所四年神牲所革後改立犧牲所永樂中建今所於京師年闕是後倉與牲房遞加焉掌印千户一員僉書千户二員掌印百戶一員僉書百戶二員鎮撫百户一員管存恤百戶一員按本所原無世襲官員其千百戶等官俱兵部于各衛所考選調補本所管事如考選不稱職則革任回本衛所洪武初設廩犧令大使副使等官後設武職并軍人専管收養嘉靖中止有掌印僉書千百戶六員隆慶四年兵部考選題準增鎮撫存恤百戶各一員其帶俸百戶一員止於本所帶俸糧原非正額司吏一名旗軍三百二十名舊額三百八十一名嘉靖中兵部裁革八十一名止用三百名萬厯四年兵部題準增三百二十名有缺本所申寺轉呈兵部題補犧牲所軍三百二十名例分為二班循環喂養牲隻日久怠玩牧養不時甚至尅減草料瘦損犧牲不堪以祭萬厯十七年寺卿徐元春帖委博士廳每月督查令該所造稽牲簿册驗其肥瘦併查軍人在班名數以警怠事者二十年寺卿陳大科復案令博士廳定以每月望日詣所查核致特重犧牲之意云原考本所軍人三百二十名為鼎建三陵於崇禎元年本寺移會禮兵二部具題增軍四十五名共三百六十五名至崇禎四年本寺管年博廳黃襄會同兵部職方前司主事魏清查甲軍將老弱不堪養牲供祀者裁汰三十名具題以三百三十五名永為定數欽遵為額職掌卿掌天神地祗宗廟社稷百神之禮樂總其官屬行其政令以少卿寺丞為之二凡天神地祗人鬼歲祭有常凡上祭贊相禮儀凡祭先期奏省牲南北郊請上視牲大臣繼之進祝版銅人上殿奏齋戒齋戒大祀三日今天地宗廟社稷皆齋三日中二日今朝日夕月上耕藉祭先農皆齋二日小一日示諸司按今惟帝王廟上視學奠先師孔子致齋一日然皆中祀也小祀則未見奏致齋及出示者凡薦新品物移光祿寺按舊會典云凡薦新品物每月本寺官於御前奏過送光祿寺供薦凡國有册立册封冠婚營繕出師歲時旱潦大災難請告郊廟社稷凡親王之國若朝還謁辭