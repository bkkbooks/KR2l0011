例宣德元年令免天壇壇户雜差𢎞治十五年令陵户廟户壇户量留二三十供役其丁多者悉查出當差嘉靖十五年禮部題覆壇戶户比照優免奉旨這壇户係是掃除壇壝看守重器人役一應雜泛差役準優免養馬係稅糧正額還著照舊二十六年本寺題免壇户差徭禮部覆準馬騾等項及雜泛差徭全户盡免仍給優免由帖執照賞給每上親郊天齋宫內頒賜本寺御饈二盒湯飯二次按萬厯三年又有銀八寶二十兩蓋特恩也齋宫燒火厨役每名賞布一匹每年正旦冬至萬壽聖節三次本寺堂上官典簿博士協律郎贊禮即司樂冠帶樂舞生及各壇奉祀祀丞神樂觀提點知觀樂舞生犧牲所千户百户每員名各賞鈔五貫本寺令史典吏厨役犧牲所司吏旗軍每名各賞鈔二貫以上鈔俱本寺具領狀赴天財庫領給每年樂舞生一名給賜綿布三匹折銀九錢苧布三匹折銀六錢生絹一匹折銀七錢白綿半斤折銀二錢五分共計銀二兩四錢五分其冠帶樂舞生無柴薪者亦與焉俱典簿廳手本赴太倉銀庫領給每年正旦中元冬至三次給賜樂舞生節米五升本觀自赴祿米倉支領每年祭四郊社稷給賜樂舞生淨衣圜丘二百八十七套方澤二百六十一套社稷春秋二祭各二百二十六套朝日壇二百三十二套夕月壇二百三十七套內圜丘社稷朝日夕月每套各白絹夾襖一件用絹三丈九尺藍綿布單擺直領一件用藍布三丈三尺九寸白綿布褲裙各一件共用白布四丈四尺二寸又圜丘每襖一件裝綿花八兩褲一件裝綿花八兩方澤壇白絹單襖一件用絹一丈九尺五寸藍腰機夏布單擺直領一件用夏布三丈三尺九寸白腰機夏布褲裙各一件共用白夏布三丈一尺四寸每年共用絹五千二百二十丈零一尺五寸藍綿布四千零九十五丈一尺二寸白綿布五千三百三十九丈三尺一寸白夏布八百一十九丈五尺四寸藍夏布八百八十四丈七尺九寸綿二百八十七斤每年祭四郊賞給厨役淨衣南郊三百套每套白絹夾襖一件白綿布夾褲一件襖褲俱裝綿花共一斤八兩白綿布單裙一件北郊三百套每套白腰機夏布衫裙褲各一件東西郊各二百套每套白絹夾襖一件白綿布夾褲一件白綿布單裙一件以上樂舞生厨役淨衣俱工部文思院解寺給散每年給賞犧牲所軍士每名布三匹內二匹折銀五錢一匹折鈔伍錠綿花一斤八兩布價赴太倉銀庫鈔赴天財庫綿赴戊字庫俱犧牲所自行支領給散各處修造工完賞本寺堂屬官并辦祭官樂舞生厨役銀兩絹匹鈔錠亦時時有之然無常例洪武六年奉聖旨道士明日都教來我看今後祭天地社稷也與他一套新衣服穿著供祀二十一年本司奉聖旨如今齋郎一遍祭祀打掃壇場每名賞鈔一錠鋪排也賞他一錠厨子一遍供祀宰牲每名賞他鈔七貫今後永為賞例不必來奏其餘各賞賜纍朝增減如今額太常寺正官題名記太常古秩宗即舜命伯夷者其辭曰夙夜惟寅直哉惟清簡哉斯言亦既盡矣三代而下求舉此者惟良鮮哉逮周併后夔之任一領於宗伯漢初統歸之太常太常者天子所建之旗也畫日月交龍於上百官有大功德則書之王者有大事則建以行禮官主奉持之故秦嘗改其官為奉常而謂之太常者欲令國家盛太常存也一曰尊大之義也歷代因革不同以其交於神明所以尊重之者則一其尊重之也或用列曹尚書或遷選曹尚書領護或視金紫光祿大夫或以禁林之長主判又與尚書丞郎同幕次謂之尚書裏行其官有卿一人而以少卿丞為之二其屬則典簿博士太祝奉禮協律等員其統有郊社太樂鼓吹太醫太卜廩犧諸署則天神地示人鬼之禮此其大歸也我太祖高皇帝龍飛之初稽古建官首建太常司以光列卿尋改為寺正官則有卿有少卿有丞焉他官則有屬焉有統焉以奉郊廟百神之祀逮文廟都燕為行在太常寺正統間仍舊列聖相承罔弗欽崇祀典式隆委任或判以禁林之長或加之以尚書之官寵異非常錫賚彌厚所以百有餘年黍稷馨香禮樂明備神祗昭假年榖用登嘉應休徴駢臻疊至所以敷佑我國家萬萬年之慶祚者要皆太常得人毖祀之效也今掌太常事太宗伯季公希安而下諸君子咸謂寺之正官所以主典天神表率統屬不宜無紀述以昭示後來乃礱石疏名以豫嘗讀書太常碑文其端豫憶童時即依舅氏太常少卿王公以學今餘三十年其間若姚公友直而下皆見而知之者前此又皆聞而知之者具有名德可稱可述亦可謂庶幾乎有虞之所命者走也惡乎敢辭竊慨夫我朝立國滋久禮樂當興然未有刪正之者未免滯于儀器之間如黃公鈞所云者要當稽其制作之本究夫和序之由俾一代禮樂之盛無愧於有虞成周必自太常始諸公亦有意于兹否乎故因書題名之石敢援以告他日上以安民以治風以移俗以易吾尚未老猶能播諸聲詩以歌詠我朝禮樂之盛諸公尚其圖之成化六年嵗次庚寅冬十二月吉旦朝列大夫國子監祭酒經筵官前翰林院侍讀學士兼修國史古吳陳鑑撰附文國家法六典建宫既以禮樂神人之政總之春曹又設太常卿佐使率其屬以奉郊廟羣神之祀而掌其器幣壇場儀文樂舞之數以告時於上而請行之蓋宗伯所掌天神地祗人鬼之禮以春曹舉其全以太常専其職也所為崇明禋之典以協承神休厥維重哉寺之在北都者初稱行在正統間始定今名則永樂以前故南太常也而題名所記卿及僚佐肇自洪武於建置之實不相中矣萬厯庚寅卿張公汝濟以題石且盈將更鐫以待來者則斷自永樂十八年卿蔣守約少卿傳公霞岫以下而除其官南寺者以志實也人準雷大司空年表之法列卿少而除丞以志守也舊記間有遺失又取年表所載頗增入之而隆慶以後續焉以志備也謂不佞待罪禮官請為之記洪惟我高皇帝開天創宇稽古禮文惟是郊廟百神之祀對越將享罔敢逸豫逖哉颯颯乎寶謨景訓載在典䇿規於萬世矣列聖相承率繇舊章靡有遺闕是以昊穹錫貺百神效職年榖順成羣生嘉鬯與虞周之盛有同符馬其維明德之歆升聞於上亦越奉齍蒞鬯之臣陳信祝嘏以假於上下神祗與有榮號哉及遡穆考以前寺之卿佐間或參以宗祝秩之上其習於祼將示有常也不佞竊有覩焉古者官不易方材不兼任伯夷典禮后夔典樂各效一職不二其守以終其身故能摶心揖志儲精會神以逆釐三靈而叶調元化也今之太常既以一官兼夷夔之任而備其所不能周又皆出於仙曹瑣闥極當時華要之選垂魚擁佩朝遊於圭瓚之側暮翔於斗樞之地即欲精白一心肅祗厥職以掦洪輝而甄靈貺時不幾也無已而委之宗祝曰以其服習有常不忒於儀云爾則無乃以人而棄官乎繄考舜之命夷曰夙夜維寅直哉維清其命夔也以直寬剛簡之德敕之則夷夔之終身於其官者固不在玉帛鐘鼓之間而在乎有禮樂之本也任是官者誠有禮樂之本以考其器數而舉其彛章則一日居職亦夷夔之一日矣繇是而後乎吾者一二人焉如之是一二人者其不為夷與夔乎又由是而後乎吾者十百人焉如之是十百人者其不為夷與夔乎有如提空名以自貴而慢厥官常以怨恫於明神即終其身於玉帛鐘鼓之間何以自異於宗祝之流而稱顯相乎聖上恪共祀典春秋匪懈祝號之史或有愆於禮度輒下詔申飭應時更置而於寺之卿佐茂簡名德以冠九列爛焉爍乎於前有輝矣繼自今以往任是官者其有不蒸蒸翼翼各率乃職以求踵夷夔之躅而委之宗祝為乎則兹石之立無亦永昭型範以畏於來哲而豈惟其名之為也則我二三禮官實儼然在庖爼之間亦曷敢不相與敬之以光揚天子之丕赫於乎重哉爰辨諸碑首用昭示千萬祀張公其有令矩於後人焉萬厯十九年辛卯孟春吉賜進士出身資政大夫禮部尚書兼翰林院學士前經筵日講官會典副總裁知起居注魯國于慎行撰卿楊訓文四川潼州人國初徴辟洪武元年任胡惟庸直𨽻定遠人元末歸附洪武二年任魏觀湖廣蒲圻人文學洪武三年任陳昧浙江平陽人國初薦舉洪武三年任吳琳湖廣黃岡人國初徴辟洪武四年任陳世舉應天府上元人薦舉洪武五年任吕復江西興國人文學洪武五年任吕本直𨽻夀州人故元掾吏洪武六年任唐鐸直𨽻虹縣人元末從征洪武七年任樂禮直𨽻全椒人薦舉洪武十二年任張道經山東蒲臺人博學儒士洪武十三年任丘玄清湖廣均州人繇道士薦舉洪武十五年任王德益洪武二十六年任黃子澄江西分宜人乙丑進士洪武二十七年任王勉陜西乾州人丙子鄉科永樂元年任蔣守約宜𨽻宜興人繇樂舞生永樂十一年任姚友直浙江蕭山人丁丑進士宣德六年任許彬山東寧陽人乙未進士正統十四年任李希安順天大興人繇樂舞生天順元年任加禮部尚書孫廣安順天大興人繇樂舞生成化十一年任劉岌四川涪州人景泰甲戌進士成化十六年任朱福銘順天府人繇樂舞生成化十四年任丁永中應天上元人繇樂舞生成化十七年任顧玒順天大興人繇樂舞生成化十八年任齊章直𨽻灤州人監生𢎞治三年任崔志端順天宛平人繇樂舞生𢎞治四年任田景賢順天琢州人成化乙未進士𢎞治十二年任歷太子少保廖紀直𨽻東光人𢎞治庚戌進士正德七年任楊廷儀四川新都人𢎞治己未進士正德九年任歷兵部左侍郎楊旦福建建安人𢎞治庚戌進士正德十年任歷吏部尚書劉愷直𨽻新安人𢎞治庚戌進士正德十年任汪舉浙江仁和人順天籍𢎞治壬戌進士正德十六年任張瓚直𨽻滄州人𢎞治乙丑進士嘉靖四年任聞淵浙江鄞縣人𢎞治乙丑進士嘉靖六年任陳道瀛直𨽻淶水人繇樂舞生嘉靖八年任加升工部尚書金贇仁順天大興人繇樂舞生嘉靖十年任加升禮部侍郎桑友蘭順天大興縣人繇樂舞生嘉靖十七年任徐可成順天東安人繇樂舞生嘉靖九年任曹守清順天大興人蘇州籍繇樂舞生嘉靖二十五年任馬良德順天人直𨽻高郵籍繇樂舞生嘉靖三十五年任師宗記直𨽻易州人繇樂舞生嘉靖三十六年任加禮部右侍郎崔仲儒山東陽信人繇樂舞生嘉靖四十年任鄒應龍陜西長安人蘭州籍嘉靖丙辰進士隆慶元年任陳紹儒廣東南海人嘉靖戊戌進士隆慶元年任陳慶江西永豐人嘉靖庚戌進士隆慶三年任李際春河南杞縣人嘉靖丙辰進士隆慶五年任升通政使王凝湖廣宜城籍江西安福縣人丙辰進士隆慶六年任陸光祖浙江平湖人嘉靖丁未進士萬厯三年未任升刑部尚書劉一儒湖廣夷陵人嘉靖己未進士萬厯三年任胡執禮陜西永昌衛人蘭州籍嘉靖己未進士萬厯四年任王友賢山西寧鄉縣人嘉靖己未進士萬厯四年任陳于陛直𨽻曲周縣人嘉靖己未進士萬厯六年任溫純陜西三原縣人嘉靖乙丑進士萬厯七年任隂武卿四川內江縣人丙辰進士萬厯七年任李輔江西進賢縣人己未進士萬厯十年任沈人种直𨽻嘉定人嘉靖己未進士萬厯十三年任升都察院何濬江西廣昌人嘉靖己未進士萬厯十三年任升刑部侍郎嚴大紀浙江餘姚人太醫院籍己未進士萬厯十三年任裴應章福建清流人隆慶戊辰進士萬厯十四年任升都察院右副都御史周繼山東歷城人嘉靖乙丑進士萬厯十五年任升都察院李尚思山西曲沃人隆慶戊辰進士萬厯十六年任升都察院右副都御史徐元春直𨽻華亭人萬厯甲戌進士萬厯十七年任趙世卿山東歷城人隆慶辛未進士萬厯十年任盧維禎福建漳浦人隆慶戊辰進士萬厯十八年任升大理寺卿吳自新應天祁門人隆慶戊辰進士萬厯十八年任升都察院右副都御史張汝濟湖廣江陵人隆慶戊辰進士萬厯十八年任升都察院陳大科直𨽻通州