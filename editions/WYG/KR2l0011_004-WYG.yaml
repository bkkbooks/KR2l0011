body:
  text: 太常續考卷四長陵等陵事宜十二陵俱在昌平州天壽山山初名黄土山永樂年改為今名成祖文皇帝陵曰長陵仁孝文皇后合𦵏仁宗昭皇帝陵曰獻陵在長陵西誠孝昭皇后合𦵏宣宗章皇帝陵曰景陵在長陵東孝恭章皇后合𦵏英宗睿皇帝陵曰裕陵在獻陵西孝莊睿皇后孝肅皇后合𦵏憲宗純皇帝陵曰茂陵在裕陵西孝貞純皇后孝穆皇后孝惠皇后合𦵏孝宗敬皇帝陵曰泰陵在茂陵西孝康敬皇后合𦵏武宗毅皇帝陵曰康陵在泰陵西南孝靜毅皇后合𦵏世宗肅皇帝陵曰永陵在景陵東南孝潔肅皇后孝烈皇后孝恪皇后合𦵏穆宗荘皇帝陵曰昭陵在長陵西南孝懿荘皇后孝安皇后孝定皇后合𦵏神宗顯皇帝陵曰定陵在昭陵之北孝端顯皇后孝靜皇后合𦵏光宗貞皇帝陵曰慶陵在裕陵東南孝元貞皇后孝和皇后孝純皇后合𦵏熹宗悊皇帝陵曰徳陵在永陵之東各陵寳城上正前為明樓樓前為石几筵又前為祾恩殿為祾恩門各陵殿舊名享殿嘉靖十七年上躬祀天夀山諸陵始名殿曰祾恩殿門曰祾恩門祾者祭而受福之名也恩者罔極之恩也門外為聖績碑亭為神庫神厨宰牲亭長陵迤南為總神路又為門門外列石文武大臣象獸石柱及牌樓南為紅門門内為拂塵殿門外為石牌坊永陵東南有感恩殿殿東為神馬厰十二陵各置衛設神宫監祠祭署長陵祠署建于本陵神宫監南中為公座左右為官舍前為署門永樂七年建獻陵祠祭署建于本陵宰牲亭左制如長陵祠祭署洪武元年建景陵祠祭署建于本陵宰牲亭右中為公座後為官舍前為署門宣徳十年建裕陵祠祭署建於本陵宰牲亭左制如長陵祠祭署天順八年建茂陵祠祭署建于本陵宰牲亭左制如長陵祠祭署成化二十三年建泰陵祠祭署建于本陵宰牲亭左制如長陵祠祭署𢎞治十八年建康祠祭署建于本陵宰牲亭左制如景陵祠祭署正徳十六年建永陵祠祭署建于本陵宰牲亭左制如景陵祠祭署嘉靖十五年建昭陵祠祭署建于本陵宰牲亭左制如景陵祠祭署隆慶六年建定陵祠祭署建于本陵宰牲亭左制如昭陵祠祭署萬厯十一年建慶陵祠祭署建于本陵橋南向東制如定陵祠祭署天啓元年建徳陵祠祭署建于本陵宰牲亭左制如永陵祠祭署崇禎元年建以上十二署署官各奉祀一員祀丞一員陵户各四十名惟昭陵為四十五名長陵十六妃止以数目為次並無諡號姓氏俱從𦵏獻陵七妃恭靜賢妃李氏恭懿惠妃趙氏貞靜敬妃張氏四妃五妃六妃七妃俱無諡號姓氏四位從𦵏三𦵏金山景陵八妃榮思賢妃吴氏二妃三妃四妃五妃六妃七妃八妃俱無諡號姓氏七位從𦵏一𦵏金山裕陵十八妃無從𦵏靖荘安穆宸妃萬氏恭荘端惠徳妃魏氏昭肅靖端賢妃王氏端靖安和惠妃王氏荘和安靖順妃樊氏荘僖端肅安妃楊氏端荘昭妃武氏恭安和妃宫氏端和懿妃黄氏荘靖安榮淑妃髙氏安和榮靖麗妃劉氏以下八妃俱用素饈恭僖成妃張氏昭靖恭妃劉氏僖恪充妃余氏惠和麗妃陳氏榮靖貞妃王氏恭靖荘妃趙氏以上各妃俱𦵏金山貞順懿恭惠妃劉氏𦵏綿山茂陵廢后吴氏墳在金山後十四妃無從𦵏端榮昭妃王氏端順賢妃栢氏端僖安妃姚氏康順端妃潘氏靜僖榮妃唐氏和惠靜妃樂氏恭惠和妃梁氏荘懿徳妃張氏恭懿敬妃王氏靖順惠妃郭氏荘靜順妃王氏榮惠恭妃楊氏昭順麗妃章氏以上俱𦵏金山口十三位共一墓恭肅端順榮靖皇貴妃萬氏𦵏大陵山九龍池南在茂陵西南康陵二妃無從𦵏榮淑賢妃沈氏淑惠徳妃吳氏俱𦵏金山永陵繼后并三十三妃二十六嬪無從𦵏繼后張氏悼隠恭妃文氏𦵏金山榮安惠順端僖皇貴妃閆氏荘順安榮貞靖皇貴妃沈氏恭僖貞靖貴妃文氏恭順端和温靖皇貴妃王氏懐榮賢妃鄭氏榮安貞妃馬氏恭淑安僖榮妃楊氏𦵏墺兒塔宜妃包氏靜妃陳氏睦妃何氏麗妃王氏晏妃禇氏常妃張氏莊妃王氏和妃髙氏安妃彭氏以上九妃共一墓平妃耿氏定妃吳氏順妃李氏懐嬪王氏御嬪黄氏宛嬪趙氏懐妃王氏常嬪馬氏安妃張氏以上九妃嬪共一墓常嬪劉氏常嬪楊氏常嬪張氏宜妃于氏康嬪劉氏常嬪傅氏常嬪張氏常嬪楊氏常嬪劉氏以上九妃嬪共一墓昭嬪張氏常嬪武氏宜妃宋氏靜妃朱氏和妃張氏寜嬪郭氏靜嬪田氏安妃髙氏安嬪孟氏以上九妃嬪共一墓麗嬪宋氏荘妃杜氏和嬪任氏康妃王氏常嬪髙氏常嬪王氏温靖懿妃趙氏以上七妃嬪共一墓徳妃張氏徽妃王氏莊嬪王氏惠嬪韋氏常妃陳氏常嬪李氏裕嬪王氏以上七妃嬪各為一墓俱𦵏金山昭陵十三妃昭順英妃魏氏安妃楊氏恭妃李氏莊僖榮妃王氏敬妃莊氏和妃趙氏莊妃劉氏端妃董氏懿妃于氏榮恪徳妃李氏康靖容妃韓氏貞惠賢妃姜氏昭懿竒妃葉氏俱𦵏金山定陵九妃六嬪恭順榮莊端靖皇貴妃李氏靖惠順妃李氏恭恪榮和靖皇貴妃鄭氏俱𦵏昌平州銀錢山温靜順妃常氏荘靖徳妃許氏榮惠宜妃楊氏端靖淑妃秦氏端靜榮妃王氏僖妃王氏順嬪張氏悼嬪耿氏徳嬪李氏榮嬪李氏敬嬪邵氏慎嬪魏氏俱𦵏金山慶陵恭懿惠順荘妃李氏徳陵悼順裕妃張氏恭惠純妃段氏諸陵殿初止設一帝一后神主嘉靖十五年世宗皇帝欲以憲宗生母孝肅太皇太后周氏孝宗生母孝穆皇太后紀氏睿宗生母孝惠太皇太后邵氏神主祔裕陵茂陵殿諭禮官曰廟祀陵祀本不同奉慈三后主二后主初享扵奉慈殿既不得祔陵殿似黜之非親之也禮官請祔孝肅主於裕陵殿孝穆孝惠主於茂陵殿合享罷三后奉慈殿之祭世宗又曰皇太后太皇太后本子孫尊稱稱睿皇后純皇后又嫌扵適改三后主皆題皇后不得書帝諡萬厯三年上諭禮官曰朕思𢎞孝殿皇祖妣孝烈皇后世宗繼后方氏也神霄殿皇祖妣孝恪皇太后穆宗生母杜氏也神主當奉遷何處禮部查有嘉靖十五年孝肅三后神主遷于陵殿之例奉聖㫖三后神主奉遷陵殿既有我皇祖舊典今宜遵行乃改題孝恪皇太后主為孝恪皇后同孝烈皇后俱祔於永陵殿罷𢎞孝神霄二殿祭長陵等十二陵諸妃舊祔陵𦵏者配享陵殿𦵏金山諸處者祭于本墳嘉靖十七年秋六陵妃俱配享各陵殿罷本墳祭而各陵諸妃嬪定慶徳諸妃今尚祭于金山各墳所每嵗清明霜降中元冬至正旦萬壽聖節共六次本寺共題請分遣勲戚大臣五員行禮長景二陵一員獻裕二陵一員茂泰康三陵一員永陵一員昭陵一員原考九陵止遣官五員分祭今増續定陵慶陵徳陵各陵俱有分遣每陵各一員惟萬壽聖節不祭從位諸妃清明霜降二次各衙門官陪拜中元冬至正旦聖節各衙門官不陪拜諸帝后忌辰本寺各題請遣官行禮帝忌辰則並祭本陵諸后后忌辰則並祭本陵帝及祔后一謁陵禮上間率后妃一行凡親王來京則有謁陵之祭之國則有辭陵之祭香帛亭亭建于昌平州署之西城隍廟之東為殿六楹前門中門各四楹左右廂各八楹後廂六楹東西有屋數區為官僚庖役齋息之所亭夫二名昌平州僉充守亭洪熈初長陵香帛至昌平寄宿舘舍宣徳間設長陵衛乃暫安于衛之㕔事𢎞治十三年寺卿崔志端於州署之西購隙地數畆疏請建亭命工部董其役嗣是香帛至州官及守備以下皆迎送如儀嘉靖三十四年九月霜降知州衛鈿不行遵奉本寺題奉聖㫖這厮且姑寛處著實打五十棍發邉衛充軍但逃殺了着該衙門行文有司再這等的依律定罪欽此自是益嚴肅無有不如人者矣毎陵祭額用牛犢猪羊本寺委犧牲所千户一員領旗軍九名先期二日送至昌平州香帛亭後舊有牲房用避雨雪年久圯壞萬厯十八年寺卿張汝濟准典簿㕔呈復建牲房七間勒碑以紀其事貲取諸寺公費是以不關将作仍僉旗軍二名輪守之且時葺之也一儀注祭日子時賛引對引導遣官至祾恩殿右門外典儀唱執事官各司其事賛引賛就位位設于殿内執事捧香盒至香案賛詣前賛引導遣官至香案前賛上香遣官二上香跪訖賛復位賛四拜典儀唱奠帛行初獻禮執事捧帛爵各獻于御案跪訖賛跪賛讀祝訖賛俯伏興平身典儀唱亞獻禮執事捧爵獻于御案跪訖典儀唱終獻禮儀同亞獻賛四拜典儀唱讀祝官捧祝進帛官捧帛各詣燎位捧祝帛官出殿中門賛禮畢一祝文長陵維年歳次十一月朔日孝𤣥孫嗣皇帝御名謹遣昭告于成祖啓天𢎞道髙明肇運聖武神功純仁至孝文皇帝仁孝慈懿誠明荘獻配天齊聖文皇后曰氣序流邁時維冬至追念深恩伏増哀感謹用祭告伏惟尚享獻陵維孝𤣥孫嗣皇帝御名謹遣昭告于仁宗敬天體道純誠至徳𢎞文欽武章聖達孝昭皇帝誠孝恭肅明徳𢎞仁順天啓聖昭皇后曰文同前景陵維孝𤣥孫嗣皇帝御名謹遣昭告于宣宗憲天崇道英明神聖欽文昭武寛仁純孝章皇帝孝恭懿憲慈仁荘烈齊天配聖章皇后曰日月不居聖容益逺兹遇冬至追念大恩不勝哀感謹用祭告伏惟尚享裕陵維孝𤣥孫嗣皇帝御名謹遣昭告于英宗法天立道仁明誠敬昭文憲武至徳廣孝睿皇帝孝荘獻穆𢎞惠顯仁恭天欽聖睿皇后孝肅貞順康懿光烈輔天成聖皇后曰氣序流邁時維冬至追慕深恩伏増哀感謹用祭告伏惟尚享茂陵維孝𤣥孫嗣皇帝御名謹遣昭告于憲宗繼天凝道誠明仁敬崇文肅武宏徳聖孝純皇帝孝貞荘懿恭靖仁慈欽天輔聖純皇后孝穆慈慧恭恪荘僖崇天承聖皇后孝惠康肅温仁懿順恊天佑聖皇后曰文同裕陵泰陵維孝𤣥姪孫嗣皇帝御名謹遣昭告于孝宗建天明道誠純中正聖文神武至仁大徳敬皇帝孝康靖肅荘慈哲懿翊天賛聖敬皇后曰氣序流邁時維冬至追念深恩益增哀感謹用祭告伏惟尚享康陵維孝𤣥姪孫嗣皇帝御名謹遣昭告于皇髙伯祖考武宗承天達道英肅睿哲昭徳顯功宏文思孝毅皇帝皇髙伯祖妣孝靜荘惠安肅温誠順天偕聖毅皇后曰文同泰陵永陵維孝𤣥孫嗣皇帝御名謹遣昭告于皇髙祖考世宗欽天履道英毅聖神宣文廣武洪仁大孝肅皇帝皇髙祖妣孝潔恭懿慈睿安荘相天翊聖肅皇后皇髙祖妣孝烈端順敏惠恭誠祗天衛聖皇后皇髙祖妣孝恪淵純慈懿恭順賛天開聖皇后曰嵗序流邁時維冬至追慕深恩益増哀感謹用祭告伏惟鑒歆昭陵維孝曽孫嗣皇帝御名謹遣昭告于皇曾祖考穆宗契天隆道淵懿寛仁顯文光武純徳𢎞孝荘皇帝皇曾祖妣孝懿貞惠順哲恭仁儷天襄聖荘皇后皇曽祖妣孝安貞懿恭純温惠佐天𢎞聖皇后皇曾祖妣孝定貞純欽仁端肅弼天祚聖皇后曰文同永陵定陵維孝孫嗣皇帝御名謹遣昭告于皇祖考神宗範天合道哲肅敦簡光文章武安仁止孝顯皇帝皇祖妣孝端貞恪荘惠仁明嫓天毓聖顯皇后皇祖妣孝靖温懿敬讓貞慈叅天𦙍聖皇后曰文同前慶陵維孝子嗣皇帝御名謹遣昭告于皇考光宗崇天契道英睿恭純憲文景武渊仁懿孝貞皇帝皇妣孝元昭懿哲惠荘仁合天弼聖貞皇后皇妣孝和恭獻温穆徽慈諧天鞠聖皇后皇妣孝純淵静慈順肅恭毗天鍾聖皇后曰文同前徳陵維孝弟嗣皇帝御名謹遣昭告于皇兄熹宗達天闡道敦孝篤友章文襄武靖穆荘勤悊皇帝曰時序遷流某節屇仰念宏徳追感倍增謹用祭告伏惟鑒歆一前期五日本寺委恊律郎提調樂舞生于太和殿演各陵墳所禮儀十二陵前期三日本寺發香祝牲帛至昌平州本州官吏鼓樂迎于南門外行一拜三叩頭禮奉安于香帛亭各官行五拜三叩頭禮前期二日發昌平各官送于西門外如迎儀前期一日陳設西山陵園事宜恭讓章皇后陵在西山陵前為享殿殿外為神庫神厨宰牲亭内官房每嵗清明霜降中元冬至正旦萬壽聖節后忌辰共七次本寺題請遣内官行禮恭仁康定景皇