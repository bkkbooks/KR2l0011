body:
  text: 太常續考卷八泰享殿殿在圜丘後嘉靖十七年上欲宗祀皇考以配上帝詔舉大享禮于𤣥極寶殿二十四年乃撤大祀殿即於舊址建㤗享殿其上臺三成殿制周圍為十二方殿後為皇乾殿東為神庫宰牲亭神厨𤣥極寶殿殿建于宫右乾隅即舊欽安殿也嘉靖中行大享祈榖禮其中改名𤣥極寶殿隆慶元年大享祈榖禮罷仍名欽安殿祈榖嘉靖九年既建圜丘方澤分祀天地復以嵗孟春上辛日祀上帝於大祀殿行祈榖禮言官夏言議請南北二郊奉太祖配祈榖奉文皇帝配下廷議羣臣以為不可疏留中言又疏請上怒羣臣違君叛禮令祈榖二祖並配二郊専奉太祖配十年又改以啓蟄日行祈榖禮于圜丘仍止奉太祖配十八年春又改行祈榖禮于𤣥極寳殿不奉配二十四年撤大祀殿改建泰享殿復擬行祈榖禮于泰享殿後殿成止行于𤣥極寶殿隆慶元年祈榖禮罷一驚蟄日行祈榖禮于泰享殿一前期一月本寺擇吉日詣犧牲所洗滌牲隻後每日差屬官一員看滌務期潔淨以備供祀本日委協律郎提調樂舞生執事于太和殿朝夕演習禮樂一前期十五日本寺具題請看牲次題請命大臣四員看牲一行手本知㑹看牲大臣一前期七日行掲帖知㑹司禮監接看牲官本奏祭祀一行手本知㑹鴻臚寺請陞殿奏祭祀行掲帖知㑹司禮監奏祭祀一前期六日本寺官早詣景神殿候上致辭拜告一告辭孝𤣥孫嗣皇帝御名明日恭視祈榖牲儀謹詣祖宗列聖帝后神位前恭預告知一前期五日上御奉天門本寺官跪奏看牲官員題本進司禮監官接本去訖奏云請聖駕看牲承㫖叩三頭速出詣犧牲所候上至導上至犧牲所香案太常卿同冬至奏牛犢北羊鹿兎豕大祀改祈榖上視畢回至景神殿致辭參拜畢上囘宫一㕘辭孝𤣥孫嗣皇帝御名恭視祈榖牲儀囘還恭詣祖宗列聖帝后神位前謹用㕘拜一告㕘合用香燭俱與大報同一前期四日本寺官具公服奏祭祀進銅人齋牌于文華殿東安設北向一齋牌嘉靖㡬年㡬月㡬日啓蟄行祈榖禮于泰享殿某日午後沐浴更衣某日為始致齋三日一東西長安門告示太常寺為祭祀事嘉靖㡬年㡬月㡬日啓蟄行祈榖禮于泰享殿文武百官自本月某日午後沐浴更衣於本衙門宿歇某日為始致齋三日其陪祀官員除年老殘疾軆氣瘡疥刑餘喪過之人不與外文官五品以上武官四品以上至日各具祭服陪祀合行知㑹一前期三日本寺官詣太和殿演習禮樂畢詣犧牲所看牲樂舞生早詣泰享殿各門燒香前期二日本寺卿同光禄卿面奏省牲行揭帖知㑹司禮監填祝版一前期一日本寺卿同光禄卿省牲復命博士捧祝版于文華殿上填御名訖博士捧出安于香帛亭内厨役擡至泰享殿神庫供奉本寺官詣景神殿候致辭一告辭孝𤣥孫嗣皇帝御名明日祇詣南郊行祈榖禮謹詣祖宗列聖帝后神位前恭預告知是日午後本寺官率鋪排厨役陳設天座供器等項樂舞生陳設樂器是夜三更時分本寺官請神位奉安陳設􅇼豆一陳設一儀注正祭日昧爽免朝錦衣衞備法駕設板輿于奉天門下正中上常服乘輿至内西天門外神樂觀二知觀叩頭起執提爐導至神路錦衣衞官跪奏落輦上降輿導引官導上至大次具祭服出導引官導上由左門入至陛上典儀唱樂舞生就位執事官各司其事内贊對引官導上至拜位内贊奏就位典儀唱迎帝神奏樂内贊奏陞壇導上至香案前奏跪奏搢圭奏上香訖奏出圭復位樂止奏四拜傳贊百官同典儀唱奠玉帛奏樂内贊奏陞壇導上至御案前奏搢圭上受玉帛奏獻玉帛訖奏出圭復位樂止典儀唱進爼奏樂内贊奏陞壇導上至爼匣前奏搢圭奏進爼奏出圭復位樂止典儀唱行初獻禮奏樂内贊奏陞壇導上至御案前奏搢圭上受爵奏獻爵訖奏出圭奏詣讀祝位奏跪傳贊衆官皆跪樂暫止贊讀祝訖樂復作奏俯伏興平身傳贊百官同奏復位樂止典儀唱行亞獻禮行終獻禮奏樂儀同初獻惟不讀祝樂止太常卿于殿西東向立唱賜福胙内贊奏詣飲福位導上至飲福位光禄卿捧福酒胙跪進于上右内贊奏跪奏搢圭奏飲福酒訖奏受胙訖奏出圭俯伏興平身復位奏四拜傳贊百官同典儀唱徹饌奏樂樂止典儀唱送帝神奏樂奏四拜傳贊百官同樂止典儀唱讀祝官捧祝進帛官捧帛掌祭官捧饌各恭詣泰壇上退拜位之東典儀唱望燎奏樂捧祝帛饌官出殿門内贊奏詣望燎位内贊對引導上至燎所燎半奏禮畢導引官導上至大次易祭服出樂止上囘至景神殿㕘拜本寺官詣景神殿候上至㕘拜一㕘辭孝𤣥孫嗣皇帝御名祗詣南郊祈榖禮成㕘詣祖宗列聖帝后神位前謹用㕘拜一正祭祝文維嗣天子臣御名祗奏于皇天上帝曰候維啓蟄農事將舉爰以兹辰敬祈洪造謹率臣僚以玉帛犧齊粢盛庶品備斯明潔㳟祀上帝于泰享殿仰希垂鑒錫福蒸民俾五榖以皆登普萬方之咸賴尚享一樂章迎神中和臣惟穹昊兮民物之初為民請命兮祀禮昭諸合四上四尺四合工尺六工尺一尺一合四合備筵率職兮祈洪庥臣𠂻微𦕈兮悃懇誠攄四合四一尺工六尺工尺一合尺一合四合遥瞻駕降兮霽色輝歡迎鼓舞兮迓龍輿合四一四尺工六工合四一四尺一四合臣愧菲才兮后斯民願福斯民兮聖恩渠工尺一尺工六工尺六工尺一尺合四合奠玉帛肅和烝民勤職兮農事顓蠶工亦慎兮固桑阡合四上四尺四合尺六工尺一尺合四合玉帛祗奏兮暨豆籩仰祈大化兮錫以豐年合四工四尺工六尺工六尺四尺一合四合進爼咸和鼎烹兮氣馨香羞兮㫖醽帝垂享兮以歆合四上四尺六工尺一尺工尺合四一四烝民䝉福兮以寕六工尺一合四合初獻壽和禮嚴兮初獻行百職趨蹌兮珮琤鳴合四上四合四工六尺一尺六工尺臣謹進兮玉觥帝心歆鑒兮歲豐亨工尺一尺六工六工尺一尺合四